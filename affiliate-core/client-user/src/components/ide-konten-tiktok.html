<!-- Ide Konten TikTok Component -->
<div id="ide-konten-tiktok-container" class="bg-gradient-to-br from-cyan-500 to-teal-500 rounded-xl p-6 shadow-lg">
  <!-- Header -->
  <div id="ide-konten-tiktok-header" class="mb-6">
    <h2 id="ide-konten-tiktok-title" class="text-2xl font-bold text-white mb-2">
      💡 Ide Konten TikTok
    </h2>
    <p id="ide-konten-tiktok-subtitle" class="text-white/90 text-sm">
      Dapatkan ide konten kreatif untuk TikTok Anda
    </p>
  </div>

  <!-- Form Container -->
  <div id="ide-konten-tiktok-form" class="bg-white rounded-lg p-6 shadow-md">
    <!-- Content Category Selection -->
    <div id="ide-konten-tiktok-category-group" class="mb-5">
      <label id="ide-konten-tiktok-category-label" for="ide-konten-tiktok-category" class="block text-gray-700 font-semibold mb-2">
        📂 Kategori Konten
      </label>
      <select id="ide-konten-tiktok-category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
        <option value="">-- Pilih Kategori --</option>
        <option value="edukasi">🎓 Edukasi</option>
        <option value="hiburan">🎭 Hiburan</option>
        <option value="lifestyle">🌟 Lifestyle</option>
        <option value="bisnis">💼 Bisnis</option>
        <option value="kecantikan">💄 Kecantikan</option>
        <option value="makanan">🍳 Makanan & Kuliner</option>
        <option value="travel">✈️ Travel</option>
        <option value="teknologi">💻 Teknologi</option>
        <option value="kesehatan">🏃 Kesehatan & Fitness</option>
        <option value="komedi">😂 Komedi</option>
      </select>
    </div>

    <!-- Niche/Topic Input -->
    <div id="ide-konten-tiktok-niche-group" class="mb-5">
      <label id="ide-konten-tiktok-niche-label" for="ide-konten-tiktok-niche" class="block text-gray-700 font-semibold mb-2">
        🎯 Niche / Topik
      </label>
      <input 
        type="text" 
        id="ide-konten-tiktok-niche" 
        placeholder="Contoh: Digital marketing, Makeup artist, Traveling..."
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"
      >
      <p id="ide-konten-tiktok-niche-help" class="text-gray-500 text-xs mt-1">
        Tuliskan niche atau topik spesifik yang Anda minati
      </p>
    </div>

    <!-- Target Audience Selection -->
    <div id="ide-konten-tiktok-audience-group" class="mb-5">
      <label id="ide-konten-tiktok-audience-label" for="ide-konten-tiktok-audience" class="block text-gray-700 font-semibold mb-2">
        👥 Target Audiens
      </label>
      <select id="ide-konten-tiktok-audience" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
        <option value="">-- Pilih Target Audiens --</option>
        <option value="remaja">👶 Remaja (13-19 tahun)</option>
        <option value="dewasa-muda">👨 Dewasa Muda (20-35 tahun)</option>
        <option value="dewasa">👴 Dewasa (36-50 tahun)</option>
        <option value="profesional">💼 Profesional</option>
        <option value="mahasiswa">🎓 Mahasiswa</option>
        <option value="ibu-rumah-tangga">🏠 Ibu Rumah Tangga</option>
        <option value="pebisnis">🚀 Pebisnis & Entrepreneur</option>
      </select>
    </div>

    <!-- Trend Incorporation Option -->
    <div id="ide-konten-tiktok-trend-group" class="mb-6">
      <label class="flex items-center cursor-pointer">
        <input 
          type="checkbox" 
          id="ide-konten-tiktok-trend" 
          class="w-5 h-5 text-cyan-600 border-gray-300 rounded focus:ring-cyan-500"
        >
        <span id="ide-konten-tiktok-trend-label" class="ml-3 text-gray-700 font-medium">
          🔥 Sertakan Tren Terkini
        </span>
      </label>
      <p id="ide-konten-tiktok-trend-help" class="text-gray-500 text-xs mt-1 ml-8">
        Ide akan disesuaikan dengan tren viral saat ini di TikTok
      </p>
    </div>

    <!-- Generate Button -->
    <button 
      id="ide-konten-tiktok-generate-btn"
      class="w-full bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-bold py-3 px-6 rounded-lg hover:from-cyan-600 hover:to-teal-600 transform hover:scale-[1.02] transition-all shadow-md hover:shadow-lg"
    >
      🚀 Generate Ide Konten
    </button>
  </div>

  <!-- Results Container (Hidden by default) -->
  <div id="ide-konten-tiktok-results" class="hidden mt-6">
    <div id="ide-konten-tiktok-results-header" class="flex items-center justify-between mb-4">
      <h3 id="ide-konten-tiktok-results-title" class="text-xl font-bold text-white">
        ✨ Ide Konten yang Dihasilkan
      </h3>
      <button 
        id="ide-konten-tiktok-clear-btn"
        class="text-white/80 hover:text-white text-sm underline"
      >
        Hapus Hasil
      </button>
    </div>
    
    <div id="ide-konten-tiktok-ideas-list" class="space-y-4">
      <!-- Ideas will be injected here -->
    </div>
  </div>
</div>

<script>
// Component initialization script
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('ide-konten-tiktok-container');
  if (!container) return;

  // Generate button click handler
  const generateBtn = document.getElementById('ide-konten-tiktok-generate-btn');
  generateBtn.addEventListener('click', generateContentIdeas);

  // Clear button click handler
  const clearBtn = document.getElementById('ide-konten-tiktok-clear-btn');
  clearBtn.addEventListener('click', clearResults);

  function generateContentIdeas() {
    const category = document.getElementById('ide-konten-tiktok-category').value;
    const niche = document.getElementById('ide-konten-tiktok-niche').value.trim();
    const audience = document.getElementById('ide-konten-tiktok-audience').value;
    const includeTrend = document.getElementById('ide-konten-tiktok-trend').checked;

    // Validation
    if (!category || !niche || !audience) {
      alert('Mohon lengkapi semua field terlebih dahulu!');
      return;
    }

    // Show loading state
    generateBtn.innerHTML = '⏳ Sedang Menghasilkan...';
    generateBtn.disabled = true;

    // Simulate API call delay
    setTimeout(() => {
      const ideas = generateIdeas(category, niche, audience, includeTrend);
      displayIdeas(ideas);
      
      // Reset button
      generateBtn.innerHTML = '🚀 Generate Ide Konten';
      generateBtn.disabled = false;
    }, 1500);
  }

  function generateIdeas(category, niche, audience, includeTrend) {
    // Template ideas based on category
    const ideaTemplates = {
      edukasi: [
        `5 Fakta Mengejutkan tentang ${niche} yang Wajib Kamu Tahu! 🤔`,
        `Tutorial ${niche} untuk Pemula dalam 60 Detik! 📚`,
        `Mitos vs Fakta: ${niche} yang Selama Ini Kamu Percaya! ❌`,
        `Rahasia ${niche} yang Tidak Ada yang Ceritakan! 🔐`,
        `Kenapa ${niche} Penting untuk ${audience}? Penjelasan Lengkap! 💡`
      ],
      hiburan: [
        `Reaksi ${audience} saat lihat ${niche} pertama kali! 😱`,
        `Komentar netizen tentang ${niche} yang Bikin Ketawa! 😂`,
        `Day in my life: Menghabiskan hari dengan ${niche}! 🎬`,
        `Pengalaman lucu saat mencoba ${niche}! 🤣`,
        `Challenge: 24 Jam Bersama ${niche}! 🎯`
      ],
      lifestyle: [
        `Daily Routine ${audience} yang suka ${niche}! 🌅`,
        `10 Hal yang ${audience} yang suka ${niche} pasti Punya! 🛍️`,
        `Morning vibes: ${niche} edition! ☕`,
        `Aesthetic ${niche} yang Cocok untuk ${audience}! 🎨`,
        `Self-care ritual dengan tema ${niche}! 🛀`
      ],
      bisnis: [
        `Tips memulai bisnis ${niche} dengan modal minim! 💰`,
        `Strategi marketing ${niche} untuk ${audience}! 📈`,
        `Error yang sering dilakukan saat bisnis ${niche}! ⚠️`,
        `Rahasia sukses bisnis ${niche} dari ahlinya! 🏆`,
        `Berapa modal yang dibutuhkan untuk bisnis ${niche}? 💵`
      ],
      default: [
        `Hal yang ${audience} perlu tahu tentang ${niche}! 🎯`,
        `Review lengkap tentang ${niche}! ⭐`,
        `Tips dan trik ${niche} untuk ${audience}! 💪`,
        `Pengalaman pribadi dengan ${niche}! 📖`,
        `Why ${niche} is perfect for ${audience}! 🌟`
      ]
    };

    let ideas = ideaTemplates[category] || ideaTemplates.default;

    // Add trend element if requested
    if (includeTrend) {
      ideas = ideas.map(idea => `🔥 TRENDING: ${idea}`);
    }

    // Add engagement elements
    ideas = ideas.map((idea, index) => ({
      id: index + 1,
      text: idea,
      engagement: Math.floor(Math.random() * 50000) + 10000,
      difficulty: ['Mudah', 'Sedang', 'Mudah', 'Sedang', 'Mudah'][index]
    }));

    return ideas;
  }

  function displayIdeas(ideas) {
    const resultsContainer = document.getElementById('ide-konten-tiktok-results');
    const ideasList = document.getElementById('ide-konten-tiktok-ideas-list');
    
    ideasList.innerHTML = '';
    
    ideas.forEach(idea => {
      const ideaCard = document.createElement('div');
      ideaCard.className = 'bg-white/90 backdrop-blur rounded-lg p-4 shadow-md hover:shadow-lg transition-shadow';
      ideaCard.innerHTML = `
        <div class="flex items-start gap-3">
          <span class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-cyan-400 to-teal-400 rounded-full flex items-center justify-center text-white font-bold text-sm">
            ${idea.id}
          </span>
          <div class="flex-1">
            <p class="text-gray-800 font-medium mb-2">${idea.text}</p>
            <div class="flex items-center gap-4 text-sm text-gray-500">
              <span class="flex items-center gap-1">
                👁️ ${(idea.engagement / 1000).toFixed(1)}K engagement
              </span>
              <span class="flex items-center gap-1">
                📊 Tingkat kesulitan: ${idea.difficulty}
              </span>
            </div>
          </div>
          <button class="copy-idea-btn text-cyan-500 hover:text-cyan-700 transition-colors" title="Salin ide">
            📋
          </button>
        </div>
      `;
      
      // Add copy functionality
      const copyBtn = ideaCard.querySelector('.copy-idea-btn');
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(idea.text);
        copyBtn.textContent = '✅';
        setTimeout(() => {
          copyBtn.textContent = '📋';
        }, 2000);
      });
      
      ideasList.appendChild(ideaCard);
    });

    resultsContainer.classList.remove('hidden');
  }

  function clearResults() {
    const resultsContainer = document.getElementById('ide-konten-tiktok-results');
    resultsContainer.classList.add('hidden');
    
    // Reset form
    document.getElementById('ide-konten-tiktok-category').value = '';
    document.getElementById('ide-konten-tiktok-niche').value = '';
    document.getElementById('ide-konten-tiktok-audience').value = '';
    document.getElementById('ide-konten-tiktok-trend').checked = false;
  }
});
</script>
