          </div>

    </main>
    
  </div>

<script>
// Affiliate Islami Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    productImage: null,
    productName: '',
    productPrice: '',
    productDesc: '',
    selectedTheme: '',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('islami-product-image-input'),
    imagePreview: document.getElementById('islami-product-image-preview'),
    imagePreviewContainer: document.getElementById('islami-product-image-preview-container'),
    removeImageBtn: document.getElementById('islami-remove-product-image-btn'),
    productName: document.getElementById('islami-product-name'),
    productPrice: document.getElementById('islami-product-price'),
    productDesc: document.getElementById('islami-product-desc'),
    themeOptions: document.getElementById('islami-theme-options'),
    generateBtn: document.getElementById('islami-generate-btn'),
    results: document.getElementById('islami-results'),
    emptyState: document.getElementById('islami-empty-state'),
    loading: document.getElementById('islami-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Product info changes
    elements.productName?.addEventListener('input', updateGenerateButton);
    elements.productPrice?.addEventListener('input', updateGenerateButton);
    elements.productDesc?.addEventListener('input', updateGenerateButton);
    
    // Theme selection
    elements.themeOptions?.addEventListener('click', handleThemeSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateContent);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.productImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.productImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle theme selection
  function handleThemeSelection(event) {
    const btn = event.target.closest('.theme-btn-islami');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.theme-btn-islami').forEach(b => {
      b.classList.remove('border-emerald-500', 'bg-emerald-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-emerald-500', 'bg-emerald-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedTheme = btn.dataset.theme || '';
    updateGenerateButton();
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.productImage !== null;
    const hasName = state.productName?.value.trim() !== '';
    const hasPrice = state.productPrice?.value.trim() !== '';
    
    elements.generateBtn.disabled = !hasImage || !hasName || !hasPrice || state.isGenerating;
  }
  
  // Generate content
  async function generateContent() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.productImage.base64, state.productImage.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const productName = state.productName?.value || 'Produk';
    const productPrice = state.productPrice?.value || '0';
    const productDesc = state.productDesc?.value || '';
    const theme = state.selectedTheme || 'Professional product photography';
    
    return `Buat konten affiliate islami yang menarik untuk produk "${productName}" dengan harga Rp${parseInt(productPrice).toLocaleString('id-ID')}.

Deskripsi produk: ${productDesc}

Tema visual: ${theme}

Buat 4 variasi konten affiliate yang:
1. Cocok untuk Instagram/TikTok
2. Menarik perhatian calon pembeli
3. Mengandung nilai-nilai islami yang sesuai
4. Professional dan berkualitas tinggi

Format output dalam HTML yang bisa langsung digunakan.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const text = response.candidates?.[0]?.content?.parts?.[0]?.text || '';
      
      // Try to parse as JSON if possible
      try {
        return JSON.parse(text);
      } catch {
        // Return as text if not JSON
        return { type: 'html', content: text };
      }
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'html' || typeof result === 'string') {
      const htmlContent = typeof result === 'string' ? result : result.content;
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
          <h3 class="font-semibold text-lg text-emerald-800 mb-4">Konten Affiliate Islami</h3>
          <div class="prose prose-emerald max-w-none">
            ${htmlContent}
          </div>
        </div>
      `;
    } else if (result.variations) {
      elements.results.innerHTML = result.variations.map((variation, index) => `
        <div class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
          <h3 class="font-semibold text-lg text-emerald-800 mb-2">${variation.title || `Variasi ${index + 1}`}</h3>
          <div class="prose prose-emerald max-w-none text-sm">
            ${variation.content || variation}
          </div>
        </div>
      `).join('');
    } else {
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
          <h3 class="font-semibold text-lg text-emerald-800 mb-4">Konten Affiliate Islami</h3>
          <div class="prose prose-emerald max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
