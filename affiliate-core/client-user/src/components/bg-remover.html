                <button type="button" data-color="#45b7d1" class="color-btn-bg-remover w-8 h-8 rounded-full border-2 border-gray-300 hover:border-amber-500 transition-colors" style="background-color: #45b7d1;"></button>

                <button type="button" data-color="#ffeaa7" class="color-btn-bg-remover w-8 h-8 rounded-full border-2 border-gray-300 hover:border-amber-500 transition-colors" style="background-color: #ffeaa7;"></button>
                <button type="button" data-color="#dfe6e9" class="color-btn-bg-remover w-8 h-8 rounded-full border-2 border-gray-300 hover:border-amber-500 transition-colors" style="background-color: #dfe6e9;"></button>

                <button type="button" data-color="#fd79a8" class="color-btn-bg-remover w-8 h-8 rounded-full border-2 border-gray-300 hover:border-amber-500 transition-colors" style="background-color: #fd79a8;"></button>
                <button type="button" data-color="#00b894" class="color-btn-bg-remover w-8 h-8 rounded-full border-2 border-gray-300 hover:border-amber-500 transition-colors" style="background-color: #00b894;"></button>

            <!-- Gradient Selection -->

              <div id="bg-remover-gradient-options" class="grid grid-cols-3 gap-2">
                <button type="button" data-gradient="linear-gradient(135deg, #667eea 0%, #764ba2 100%)" class="gradient-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent selected" data-selected="true">

                <button type="button" data-gradient="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" class="gradient-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-400 to-cyan-400"></div>
                  <span class="mt-1 block">Biru</span>
                </button>
                <button type="button" data-gradient="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" class="gradient-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-gradient-to-br from-green-400 to-teal-400"></div>
                  <span class="mt-1 block">Hijau</span>
                </button>
                <button type="button" data-gradient="linear-gradient(135deg, #fa709a 0%, #fee140 100%)" class="gradient-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-gradient-to-br from-pink-500 to-yellow-400"></div>
                  <span class="mt-1 block">Cerah</span>
                </button>
                <button type="button" data-gradient="linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)" class="gradient-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">

        <!-- Step 3: Edge Smoothing -->

            </label>

        <!-- Step 4: Output Format -->

          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Format Output</h2>
          
          <div id="bg-remover-format-options" class="grid grid-cols-3 gap-2">
            <button type="button" data-format="png" class="format-btn-bg-remover p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent selected" data-selected="true">

        <!-- Step 5: Generate Button -->
        <button id="bg-remover-generate-btn" class="w-full bg-gradient-to-r from-amber-600 to-orange-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Hapus Latar
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="bg-remover-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="bg-remover-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-image text-6xl mb-4 text-amber-400"></i>
            <p class="text-xl">Hasil akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto dan klik Hapus Latar</p>
          </div>
          <div id="bg-remover-results" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
          <div id="bg-remover-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-amber-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang menghapus latar...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Background Remover Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    bgImage: null,
    bgType: 'transparent',
    selectedColor: '#ffffff',
    selectedGradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    edgeSmoothing: 10,
    outputFormat: 'png',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('bg-remover-image-input'),
    imagePreview: document.getElementById('bg-remover-image-preview'),
    imagePreviewContainer: document.getElementById('bg-remover-image-preview-container'),
    removeImageBtn: document.getElementById('bg-remover-remove-image-btn'),
    bgTypeOptions: document.getElementById('bg-remover-bg-type-options'),
    solidColorContainer: document.getElementById('bg-remover-solid-color-container'),
    gradientContainer: document.getElementById('bg-remover-gradient-container'),
    colorOptions: document.getElementById('bg-remover-color-options'),
    customColor: document.getElementById('bg-remover-custom-color'),
    customColorText: document.getElementById('bg-remover-custom-color-text'),
    gradientOptions: document.getElementById('bg-remover-gradient-options'),
    edgeSmoothingSlider: document.getElementById('bg-remover-edge-smoothing'),
    edgeValue: document.getElementById('bg-remover-edge-value'),
    formatOptions: document.getElementById('bg-remover-format-options'),
    generateBtn: document.getElementById('bg-remover-generate-btn'),
    results: document.getElementById('bg-remover-results'),
    emptyState: document.getElementById('bg-remover-empty-state'),
    loading: document.getElementById('bg-remover-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Background type selection
    elements.bgTypeOptions?.addEventListener('click', handleBgTypeSelection);
    
    // Color selection
    elements.colorOptions?.addEventListener('click', handleColorSelection);
    
    // Custom color input
    elements.customColor?.addEventListener('input', handleCustomColorInput);
    elements.customColorText?.addEventListener('input', handleCustomColorTextInput);
    
    // Gradient selection
    elements.gradientOptions?.addEventListener('click', handleGradientSelection);
    
    // Edge smoothing slider
    elements.edgeSmoothingSlider?.addEventListener('input', handleEdgeSmoothingChange);
    
    // Format selection
    elements.formatOptions?.addEventListener('click', handleFormatSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateBgRemoval);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.bgImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.bgImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle background type selection
  function handleBgTypeSelection(event) {
    const btn = event.target.closest('.bg-type-btn-bg-remover');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.bg-type-btn-bg-remover').forEach(b => {
      b.classList.remove('border-amber-500', 'bg-amber-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-amber-500', 'bg-amber-100');
    btn.setAttribute('data-selected', 'true');
    
    state.bgType = btn.dataset.bgType || 'transparent';
    
    // Show/hide appropriate containers
    updateBgOptionsVisibility();
    updateGenerateButton();
  }
  
  // Update background options visibility
  function updateBgOptionsVisibility() {
    if (elements.solidColorContainer) {
      elements.solidColorContainer.classList.toggle('hidden', state.bgType !== 'solid');
    }
    if (elements.gradientContainer) {
      elements.gradientContainer.classList.toggle('hidden', state.bgType !== 'gradient');
    }
  }
  
  // Handle color selection
  function handleColorSelection(event) {
    const btn = event.target.closest('.color-btn-bg-remover');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.color-btn-bg-remover').forEach(b => {
      b.classList.remove('border-amber-500', 'ring-2', 'ring-amber-300');
      b.classList.add('border-gray-300');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-gray-300');
    btn.classList.add('border-amber-500', 'ring-2', 'ring-amber-300');
    btn.setAttribute('data-selected', 'true');
    
    const color = btn.dataset.color || '#ffffff';
    state.selectedColor = color;
    
    // Update custom color inputs
    if (elements.customColor) {
      elements.customColor.value = color;
    }
    if (elements.customColorText) {
      elements.customColorText.value = color;
    }
  }
  
  // Handle custom color input
  function handleCustomColorInput(event) {
    const color = event.target.value;
    state.selectedColor = color;
    
    if (elements.customColorText) {
      elements.customColorText.value = color;
    }
    
    // Update selected state in color buttons
    document.querySelectorAll('.color-btn-bg-remover').forEach(btn => {
      if (btn.dataset.color === color) {
        btn.click();
      }
    });
  }
  
  // Handle custom color text input
  function handleCustomColorTextInput(event) {
    let color = event.target.value.trim();
    
    // Validate hex color
    if (/^#[0-9A-Fa-f]{6}$/.test(color)) {
      state.selectedColor = color;
      
      if (elements.customColor) {
        elements.customColor.value = color;
      }
      
      // Update selected state in color buttons
      document.querySelectorAll('.color-btn-bg-remover').forEach(btn => {
        if (btn.dataset.color === color) {
          btn.click();
        }
      });
    }
  }
  
  // Handle gradient selection
  function handleGradientSelection(event) {
    const btn = event.target.closest('.gradient-btn-bg-remover');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.gradient-btn-bg-remover').forEach(b => {
      b.classList.remove('border-amber-500', 'bg-amber-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-amber-500', 'bg-amber-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedGradient = btn.dataset.gradient || 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
  }
  
  // Handle edge smoothing change
  function handleEdgeSmoothingChange(event) {
    const value = event.target.value;
    state.edgeSmoothing = parseInt(value, 10);
    
    // Update display value
    if (value < 30) {
      elements.edgeValue.textContent = 'Halus';
    } else if (value > 70) {
      elements.edgeValue.textContent = 'Kasar';
    } else {
      elements.edgeValue.textContent = 'Normal';
    }
  }
  
  // Handle format selection
  function handleFormatSelection(event) {
    const btn = event.target.closest('.format-btn-bg-remover');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.format-btn-bg-remover').forEach(b => {
      b.classList.remove('border-amber-500', 'bg-amber-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-amber-500', 'bg-amber-100');
    btn.setAttribute('data-selected', 'true');
    
    state.outputFormat = btn.dataset.format || 'png';
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.bgImage !== null;
    const hasBgOption = state.bgType === 'transparent' || 
                        state.bgType === 'solid' || 
                        state.bgType === 'gradient';
    elements.generateBtn.disabled = !hasImage || !hasBgOption || state.isGenerating;
  }
  
  // Generate background removal
  async function generateBgRemoval() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.bgImage.base64, state.bgImage.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    let bgDescription = '';
    
    switch (state.bgType) {
      case 'transparent':
        bgDescription = 'Remove the background completely, keeping only the subject with transparent background';
        break;
      case 'solid':
        bgDescription = `Remove the background and replace it with solid color ${state.selectedColor}`;
        break;
      case 'gradient':
        bgDescription = `Remove the background and replace it with gradient background: ${state.selectedGradient}`;
        break;
      default:
        bgDescription = 'Remove the background completely, keeping only the subject with transparent background';
    }
    
    const edgeSmoothing = state.edgeSmoothing;
    let edgeDescription = '';
    if (edgeSmoothing < 30) {
      edgeDescription = 'Smooth edges with feathered transition';
    } else if (edgeSmoothing > 70) {
      edgeDescription = 'Sharp edges, precise cutout';
    } else {
      edgeDescription = 'Natural edge smoothing';
    }
    
    return `Remove the background from this image with the following specifications:
    
Background type: ${bgDescription}
Edge smoothing: ${edgeDescription}
Output format: ${state.outputFormat.toUpperCase()}

Create a clean, professional image with the background removed. Ensure:
1. Subject is properly isolated
2. Edges are clean and natural
3. Fine details like hair are preserved
4. Result is suitable for professional use

Return the processed image.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (!imageData) {
        throw new Error('No image data in response');
      }
      
      const mimeType = response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || `image/${state.outputFormat}`;
      
      return {
        type: 'image',
        data: imageData,
        mimeType: mimeType
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      const filename = `bg-removed.${state.outputFormat}`;
      
      elements.results.innerHTML = `
        <div class="col-span-2">
          <div class="bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-6 border border-amber-200">
            <h3 class="font-semibold text-lg text-amber-800 mb-4">Hasil Penghapusan Latar</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="Background Removed Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="bg-remover-download-btn" data-image-url="${imageUrl}" data-filename="${filename}" class="bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('bg-remover-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-6 border border-amber-200">
          <h3 class="font-semibold text-lg text-amber-800 mb-4">Hasil</h3>
          <div class="prose prose-amber max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
