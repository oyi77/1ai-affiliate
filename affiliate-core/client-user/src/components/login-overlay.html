<div id=login-overlay>
    <div class=login-box>
        <h2><i class="fas fa-lock"></i> 1affiliate</h2>
        <p style=font-size:.95em;opacity:.9>Masukkan Email Pembelian Anda</p><input type=email id=emailInput
            class=login-input placeholder=contoh@gmail.com autocomplete=email>
        <div style="display:flex;gap:10px;margin-top:10px;">
            <button onclick=prosesLogin() class=login-btn style="flex:1;"><i class="fas fa-sign-in-alt"></i>
                MASUK</button>
            <button onclick=prosesRegister() class=login-btn style="flex:1;background-color:#10b981;"><i
                    class="fas fa-user-plus"></i> DAFTAR</button>
        </div>
        <div id=loadingMsg class=login-loading><i class="fas fa-spinner fa-spin"></i> Sedang memverifikasi...</div>
        <div id=errorMsg class=login-error></div>
        <div style=margin-top:25px;font-size:.85em;opacity:.7><i class="fas fa-shield-alt"></i> Sistem Login
            Terenkripsi & Aman</div>
    </div>
</div>
