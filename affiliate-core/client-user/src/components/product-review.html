<div id="content-product-review" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-violet-500 bg-clip-text text-transparent">
        <i class="fas fa-star mr-3"></i>Ulasan Produk
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat ulasan produk yang menarik dengan bantuan AI</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Upload Product Photo -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Foto Produk</h2>
          <div class="upload-area">
            <label for="product-review-image-input" class="file-input-label block text-sm border-3 border-dashed border-purple-300 rounded-xl p-8 text-center cursor-pointer hover:border-purple-500 transition-colors">
              <input type="file" id="product-review-image-input" class="hidden" accept="image/*">
              <i class="fas fa-camera text-4xl text-purple-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto produk di sini</p>
            </label>
          </div>
          <div id="product-review-image-preview-container" class="hidden mt-4">
            <img id="product-review-image-preview" src="#" alt="Pratinjau Produk" class="rounded-lg w-full h-auto object-contain">
            <button id="product-review-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 2: Product Information -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Informasi Produk</h2>
          
          <div class="space-y-4">
            <!-- Product Name -->
            <div>
              <label for="product-review-name" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-tag mr-1 text-purple-500"></i>Nama Produk
              </label>
              <input type="text" id="product-review-name" placeholder="Contoh: Samsung Galaxy S24 Ultra" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Brand -->
            <div>
              <label for="product-review-brand" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-building mr-1 text-purple-500"></i>Merek
              </label>
              <input type="text" id="product-review-brand" placeholder="Contoh: Samsung" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Price -->
            <div>
              <label for="product-review-price" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-tag mr-1 text-purple-500"></i>Harga (Rp)
              </label>
              <input type="text" id="product-review-price" placeholder="Contoh: 15.000.000" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Pros -->
            <div>
              <label for="product-review-pros" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-thumbs-up mr-1 text-green-500"></i>Kelebihan
              </label>
              <textarea id="product-review-pros" rows="3" placeholder="Tuliskan kelebihan produk (pisahkan dengan koma)"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
            
            <!-- Cons -->
            <div>
              <label for="product-review-cons" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-thumbs-down mr-1 text-red-500"></i>Kekurangan
              </label>
              <textarea id="product-review-cons" rows="3" placeholder="Tuliskan kekurangan produk (pisahkan dengan koma)"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
          </div>
        </div>
        
        <!-- Step 3: Review Style -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Gaya Ulasan</h2>
          <div id="product-review-style-options" class="grid grid-cols-1 gap-2">
            <button type="button" data-style="professional" class="style-btn-product-review p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-briefcase mr-2 text-purple-500"></i>
              <span class="font-medium">Profesional</span>
              <p class="text-xs text-gray-500 mt-1">Ulasan formal dengan struktur yang jelas</p>
            </button>
            <button type="button" data-style="casual" class="style-btn-product-review p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-coffee mr-2 text-purple-500"></i>
              <span class="font-medium">Casual</span>
              <p class="text-xs text-gray-500 mt-1">Gaya santai seperti berbagi pengalaman</p>
            </button>
            <button type="button" data-style="influencer" class="style-btn-product-review p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-instagram mr-2 text-purple-500"></i>
              <span class="font-medium">Influencer</span>
              <p class="text-xs text-gray-500 mt-1">Gaya menarik dengan emoji dan hashtag</p>
            </button>
            <button type="button" data-style="detailed" class="style-btn-product-review p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-search mr-2 text-purple-500"></i>
              <span class="font-medium">Detail</span>
              <p class="text-xs text-gray-500 mt-1">Analisis mendalam dengan spesifikasi lengkap</p>
            </button>
          </div>
        </div>
        
        <!-- Step 4: Generate Button -->
        <button id="product-review-generate-btn" class="w-full bg-gradient-to-r from-purple-600 to-violet-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Ulasan
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="product-review-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="product-review-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-star text-6xl mb-4 text-purple-400"></i>
            <p class="text-xl">Hasil ulasan akan muncul di sini</p>
            <p class="text-sm mt-2">Isi informasi produk dan klik Buat Ulasan</p>
          </div>
          <div id="product-review-results" class="hidden space-y-6"></div>
          <div id="product-review-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-purple-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat ulasan...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Product Review Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    productImage: null,
    productName: '',
    brand: '',
    price: '',
    pros: '',
    cons: '',
    selectedStyle: 'professional',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('product-review-image-input'),
    imagePreview: document.getElementById('product-review-image-preview'),
    imagePreviewContainer: document.getElementById('product-review-image-preview-container'),
    removeImageBtn: document.getElementById('product-review-remove-image-btn'),
    productNameInput: document.getElementById('product-review-name'),
    brandInput: document.getElementById('product-review-brand'),
    priceInput: document.getElementById('product-review-price'),
    prosInput: document.getElementById('product-review-pros'),
    consInput: document.getElementById('product-review-cons'),
    styleOptions: document.getElementById('product-review-style-options'),
    generateBtn: document.getElementById('product-review-generate-btn'),
    results: document.getElementById('product-review-results'),
    emptyState: document.getElementById('product-review-empty-state'),
    loading: document.getElementById('product-review-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Product info inputs
    elements.productNameInput?.addEventListener('input', updateGenerateButton);
    elements.brandInput?.addEventListener('input', updateGenerateButton);
    elements.priceInput?.addEventListener('input', updateGenerateButton);
    elements.prosInput?.addEventListener('input', updateGenerateButton);
    elements.consInput?.addEventListener('input', updateGenerateButton);
    
    // Style selection
    elements.styleOptions?.addEventListener('click', handleStyleSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateReview);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.productImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.productImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle style selection
  function handleStyleSelection(event) {
    const btn = event.target.closest('.style-btn-product-review');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.style-btn-product-review').forEach(b => {
      b.classList.remove('border-purple-500', 'bg-purple-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-purple-500', 'bg-purple-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedStyle = btn.dataset.style || 'professional';
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    // Update state from inputs
    state.productName = elements.productNameInput?.value || '';
    state.brand = elements.brandInput?.value || '';
    state.price = elements.priceInput?.value || '';
    state.pros = elements.prosInput?.value || '';
    state.cons = elements.consInput?.value || '';
    
    const hasRequiredInfo = state.productName.trim() !== '' && 
                           state.brand.trim() !== '' &&
                           state.pros.trim() !== '' &&
                           state.cons.trim() !== '';
    
    elements.generateBtn.disabled = !hasRequiredInfo || state.isGenerating;
  }
  
  // Generate review
  async function generateReview() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiReview(prompt);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const style = state.selectedStyle;
    let styleInstructions = '';
    
    switch (style) {
      case 'professional':
        styleInstructions = 'Write in a formal, professional tone with clear structure. Use headings, bullet points, and maintain objectivity.';
        break;
      case 'casual':
        styleInstructions = 'Write in a casual, conversational tone as if sharing with a friend. Use personal pronouns and friendly language.';
        break;
      case 'influencer':
        styleInstructions = 'Write in an engaging, trendy influencer style. Use emojis, hashtags, and exciting language to capture attention.';
        break;
      case 'detailed':
        styleInstructions = 'Write a comprehensive, detailed review with in-depth analysis. Include specifications, comparisons, and thorough evaluation.';
        break;
    }
    
    const pros = state.pros.split(',').map(p => p.trim()).filter(p => p);
    const cons = state.cons.split(',').map(c => c.trim()).filter(c => c);
    
    return `Create a product review with the following information:

Product Name: ${state.productName}
Brand: ${state.brand}
Price: ${state.price}

Pros: ${pros.join(', ')}
Cons: ${cons.join(', ')}

Style: ${styleInstructions}

Requirements:
1. Write in Indonesian language
2. Make it engaging and informative
3. Include a catchy title
4. Structure the review appropriately based on the selected style
5. Highlight both pros and cons fairly
6. End with a recommendation

Please generate a complete product review.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const text = response.candidates?.[0]?.content?.parts?.find(part => part.text)?.text;
      
      if (!text) {
        throw new Error('No text data in response');
      }
      
      return {
        type: 'text',
        content: text
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'text') {
      // Format the content with proper styling
      const formattedContent = formatReviewContent(result.content);
      
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-semibold text-lg text-purple-800">Hasil Ulasan AI</h3>
            <button id="product-review-copy-btn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors shadow-lg text-sm">
              <i class="fas fa-copy mr-2"></i>Salin
            </button>
          </div>
          <div id="product-review-content" class="prose prose-purple max-w-none">
            ${formattedContent}
          </div>
        </div>
      `;
      
      // Add copy functionality
      const copyBtn = document.getElementById('product-review-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const content = result.content;
          if (window.copyToClipboard) {
            await window.copyToClipboard(content, copyBtn);
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <h3 class="font-semibold text-lg text-purple-800 mb-4">Hasil</h3>
          <div class="prose prose-purple max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Format review content
  function formatReviewContent(content) {
    // Basic formatting - convert line breaks to paragraphs and bold headers
    let formatted = content
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    
    // Bold headers (lines ending with colon or all caps)
    formatted = formatted.replace(/^([^<]*[a-zA-Z][^<]*):$/gm, '<strong>$1:</strong>');
    
    return `<p>${formatted}</p>`;
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
