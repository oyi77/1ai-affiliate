<div id="content-konten-marketing" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-violet-500 bg-clip-text text-transparent">
        <i class="fas fa-bullhorn mr-3"></i>Konten Marketing
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat konten marketing yang menarik dengan bantuan AI</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Platform Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Platform</h2>
          <div id="konten-marketing-platform-options" class="grid grid-cols-2 gap-2">
            <button type="button" data-platform="instagram" class="platform-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent selected" data-selected="true">
              <i class="fab fa-instagram text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">Instagram</span>
            </button>
            <button type="button" data-platform="tiktok" class="platform-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-tiktok text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">TikTok</span>
            </button>
            <button type="button" data-platform="facebook" class="platform-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-facebook text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">Facebook</span>
            </button>
            <button type="button" data-platform="youtube" class="platform-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-youtube text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">YouTube</span>
            </button>
          </div>
        </div>
        
        <!-- Step 2: Content Type Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Jenis Konten</h2>
          <div id="konten-marketing-type-options" class="grid grid-cols-1 gap-2">
            <button type="button" data-type="caption" class="type-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-align-left mr-2 text-purple-500"></i>
              <span class="font-medium">Caption</span>
            </button>
            <button type="button" data-type="script" class="type-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-video mr-2 text-purple-500"></i>
              <span class="font-medium">Script Video</span>
            </button>
            <button type="button" data-type="post" class="type-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-pen mr-2 text-purple-500"></i>
              <span class="font-medium">Postingan</span>
            </button>
            <button type="button" data-type="deskripsi" class="type-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-align-center mr-2 text-purple-500"></i>
              <span class="font-medium">Deskripsi</span>
            </button>
            <button type="button" data-type="hashtag" class="type-btn-konten-marketing p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-hashtag mr-2 text-purple-500"></i>
              <span class="font-medium">Hashtag</span>
            </button>
          </div>
        </div>
        
        <!-- Step 3: Target Audience -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Target Audiens</h2>
          
          <div class="space-y-4">
            <!-- Age Range -->
            <div>
              <label for="konten-marketing-age" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-users mr-1 text-purple-500"></i>Rentang Usia
              </label>
              <select id="konten-marketing-age" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="all">Semua Usia</option>
                <option value="18-24">18-24 tahun</option>
                <option value="25-34">25-34 tahun</option>
                <option value="35-44">35-44 tahun</option>
                <option value="45-54">45-54 tahun</option>
                <option value="55+">55 tahun ke atas</option>
              </select>
            </div>
            
            <!-- Gender -->
            <div>
              <label for="konten-marketing-gender" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-venus-mars mr-1 text-purple-500"></i>Jenis Kelamin
              </label>
              <select id="konten-marketing-gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="all">Semua Jenis Kelamin</option>
                <option value="male">Laki-laki</option>
                <option value="female">Perempuan</option>
              </select>
            </div>
            
            <!-- Interests -->
            <div>
              <label for="konten-marketing-interests" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-heart mr-1 text-purple-500"></i>Minat (pisahkan dengan koma)
              </label>
              <textarea id="konten-marketing-interests" rows="2" placeholder="Contoh: teknologi, gaming, fashion, kesehatan"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
          </div>
        </div>
        
        <!-- Step 4: Key Message -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Pesan Utama</h2>
          
          <div class="space-y-4">
            <!-- Product/Service Name -->
            <div>
              <label for="konten-marketing-product" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-box mr-1 text-purple-500"></i>Nama Produk/Jasa
              </label>
              <input type="text" id="konten-marketing-product" placeholder="Contoh: Samsung Galaxy S24 Ultra" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Key Message -->
            <div>
              <label for="konten-marketing-key-message" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-comment-alt mr-1 text-purple-500"></i>Pesan Utama
              </label>
              <textarea id="konten-marketing-key-message" rows="3" placeholder="Jelaskan pesan utama yang ingin Anda sampaikan..."
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
            
            <!-- Tone/Style -->
            <div>
              <label for="konten-marketing-tone" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-smile mr-1 text-purple-500"></i>Gaya/Tone
              </label>
              <select id="konten-marketing-tone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="professional">Profesional</option>
                <option value="casual">Kasual</option>
                <option value="friendly">Ramah</option>
                <option value="persuasive">Persuasif</option>
                <option value="humorous">Humoris</option>
                <option value="inspirational">Inspiratif</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- Step 5: Generate Button -->
        <button id="konten-marketing-generate-btn" class="w-full bg-gradient-to-r from-purple-600 to-violet-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Konten
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="konten-marketing-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="konten-marketing-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-bullhorn text-6xl mb-4 text-purple-400"></i>
            <p class="text-xl">Hasil konten marketing akan muncul di sini</p>
            <p class="text-sm mt-2">Isi informasi dan klik Buat Konten</p>
          </div>
          <div id="konten-marketing-results" class="hidden space-y-6"></div>
          <div id="konten-marketing-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-purple-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat konten...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Konten Marketing Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    selectedPlatform: 'instagram',
    selectedType: 'caption',
    targetAge: 'all',
    targetGender: 'all',
    interests: '',
    productName: '',
    keyMessage: '',
    tone: 'professional',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    platformOptions: document.getElementById('konten-marketing-platform-options'),
    typeOptions: document.getElementById('konten-marketing-type-options'),
    ageSelect: document.getElementById('konten-marketing-age'),
    genderSelect: document.getElementById('konten-marketing-gender'),
    interestsInput: document.getElementById('konten-marketing-interests'),
    productInput: document.getElementById('konten-marketing-product'),
    keyMessageInput: document.getElementById('konten-marketing-key-message'),
    toneSelect: document.getElementById('konten-marketing-tone'),
    generateBtn: document.getElementById('konten-marketing-generate-btn'),
    results: document.getElementById('konten-marketing-results'),
    emptyState: document.getElementById('konten-marketing-empty-state'),
    loading: document.getElementById('konten-marketing-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Platform selection
    elements.platformOptions?.addEventListener('click', handlePlatformSelection);
    
    // Type selection
    elements.typeOptions?.addEventListener('click', handleTypeSelection);
    
    // Target audience inputs
    elements.ageSelect?.addEventListener('change', updateGenerateButton);
    elements.genderSelect?.addEventListener('change', updateGenerateButton);
    elements.interestsInput?.addEventListener('input', updateGenerateButton);
    
    // Key message inputs
    elements.productInput?.addEventListener('input', updateGenerateButton);
    elements.keyMessageInput?.addEventListener('input', updateGenerateButton);
    elements.toneSelect?.addEventListener('change', updateGenerateButton);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateContent);
  }
  
  // Handle platform selection
  function handlePlatformSelection(event) {
    const btn = event.target.closest('.platform-btn-konten-marketing');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.platform-btn-konten-marketing').forEach(b => {
      b.classList.remove('border-purple-500', 'bg-purple-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-purple-500', 'bg-purple-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedPlatform = btn.dataset.platform || 'instagram';
  }
  
  // Handle type selection
  function handleTypeSelection(event) {
    const btn = event.target.closest('.type-btn-konten-marketing');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.type-btn-konten-marketing').forEach(b => {
      b.classList.remove('border-purple-500', 'bg-purple-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-purple-500', 'bg-purple-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedType = btn.dataset.type || 'caption';
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    // Update state from inputs
    state.targetAge = elements.ageSelect?.value || 'all';
    state.targetGender = elements.genderSelect?.value || 'all';
    state.interests = elements.interestsInput?.value || '';
    state.productName = elements.productInput?.value || '';
    state.keyMessage = elements.keyMessageInput?.value || '';
    state.tone = elements.toneSelect?.value || 'professional';
    
    const hasRequiredInfo = state.productName.trim() !== '' && 
                           state.keyMessage.trim() !== '';
    
    elements.generateBtn.disabled = !hasRequiredInfo || state.isGenerating;
  }
  
  // Generate content
  async function generateContent() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiReview(prompt);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const platform = state.selectedPlatform;
    const contentType = state.selectedType;
    
    // Platform-specific instructions
    let platformInstructions = '';
    let contentTypeName = '';
    
    switch (platform) {
      case 'instagram':
        platformInstructions = 'Buat konten yang menarik untuk Instagram dengan hashtag yang relevan. Gunakan bahasa yang engaging dan visual.';
        break;
      case 'tiktok':
        platformInstructions = 'Buat konten untuk TikTok dengan hook yang menarik dan mengikuti tren. Gunakan bahasa yang casual dan entertaining.';
        break;
      case 'facebook':
        platformInstructions = 'Buat konten untuk Facebook yang shareable dan community-friendly. Gunakan bahasa yang hangat dan mengundang interaksi.';
        break;
      case 'youtube':
        platformInstructions = 'Buat konten untuk YouTube dengan deskripsi yang informatif dan menarik. Sertakan timestamp dan CTA yang jelas.';
        break;
    }
    
    // Content type mapping
    const typeNames = {
      'caption': 'Caption',
      'script': 'Script Video',
      'post': 'Postingan',
      'deskripsi': 'Deskripsi',
      'hashtag': 'Hashtag'
    };
    
    // Tone mapping
    const toneInstructions = {
      'professional': 'Gunakan bahasa profesional dan formal.',
      'casual': 'Gunakan bahasa santai dan informal.',
      'friendly': 'Gunakan bahasa yang ramah dan hangat.',
      'persuasive': 'Gunakan bahasa yang persuasif dan meyakinkan.',
      'humorous': 'Gunakan bahasa yang humoris dan menghibur.',
      'inspirational': 'Gunakan bahasa yang inspiratif dan memotivasi.'
    };
    
    // Target audience description
    let targetAudience = '';
    if (state.targetAge !== 'all') {
      targetAudience += `Usia ${state.targetAge} tahun`;
    }
    if (state.targetGender !== 'all') {
      targetAudience += targetAudience ? ' ' : '';
      targetAudience += state.targetGender === 'male' ? 'Laki-laki' : 'Perempuan';
    }
    if (state.interests.trim()) {
      targetAudience += targetAudience ? ', minat: ' : 'Minat: ';
      targetAudience += state.interests;
    }
    if (!targetAudience) {
      targetAudience = 'Semua audiens';
    }
    
    return `Buat ${typeNames[contentType] || 'Konten'} untuk ${platformInstructions}

Detail Produk/Jasa: ${state.productName}
Pesan Utama: ${state.keyMessage}

Target Audiens: ${targetAudience}

Gaya/Tone: ${toneInstructions[state.tone] || toneInstructions['professional']}

Requirements:
1. Tulis dalam bahasa Indonesia yang natural dan engaging
2. Gunakan ${state.tone === 'professional' ? 'bahasa profesional' : state.tone === 'casual' ? 'bahasa santai' : 'bahasa yang sesuai dengan tone yang dipilih'}
3. Sertakan pesan utama: ${state.keyMessage}
4. Sesuaikan dengan format dan gaya ${platform}
5. Buatlah menarik dan persuasif
6. Include relevant hashtags if appropriate for ${platform}

Mohon generate ${typeNames[contentType] || 'konten'} yang lengkap dan siap digunakan.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const text = response.candidates?.[0]?.content?.parts?.find(part => part.text)?.text;
      
      if (!text) {
        throw new Error('No text data in response');
      }
      
      return {
        type: 'text',
        content: text,
        platform: state.selectedPlatform,
        contentType: state.selectedType
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'text') {
      // Format the content with proper styling
      const formattedContent = formatContent(result.content, result.platform);
      
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-semibold text-lg text-purple-800">Hasil Konten Marketing AI</h3>
            <div class="flex gap-2">
              <button id="konten-marketing-copy-btn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors shadow-lg text-sm">
                <i class="fas fa-copy mr-2"></i>Salin
              </button>
              <button id="konten-marketing-download-btn" class="bg-violet-600 text-white px-4 py-2 rounded-lg hover:bg-violet-700 transition-colors shadow-lg text-sm">
                <i class="fas fa-download mr-2"></i>Unduh
              </button>
            </div>
          </div>
          <div id="konten-marketing-content" class="prose prose-purple max-w-none">
            ${formattedContent}
          </div>
        </div>
      `;
      
      // Add copy functionality
      const copyBtn = document.getElementById('konten-marketing-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const content = result.content;
          if (window.copyToClipboard) {
            await window.copyToClipboard(content, copyBtn);
          }
        });
      }
      
      // Add download functionality
      const downloadBtn = document.getElementById('konten-marketing-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', () => {
          downloadContent(result.content, result.platform, result.contentType);
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <h3 class="font-semibold text-lg text-purple-800 mb-4">Hasil</h3>
          <div class="prose prose-purple max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Format content
  function formatContent(content, platform) {
    // Basic formatting - convert line breaks to paragraphs
    let formatted = content
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    
    return `<p>${formatted}</p>`;
  }
  
  // Download content as text file
  function downloadContent(content, platform, contentType) {
    const platformNames = {
      'instagram': 'instagram',
      'tiktok': 'tiktok',
      'facebook': 'facebook',
      'youtube': 'youtube'
    };
    
    const typeNames = {
      'caption': 'caption',
      'script': 'script',
      'post': 'post',
      'deskripsi': 'deskripsi',
      'hashtag': 'hashtag'
    };
    
    const filename = `konten-${platformNames[platform] || 'marketing'}-${typeNames[contentType] || 'content'}-${Date.now()}.txt`;
    
    if (window.downloadTextFile) {
      window.downloadTextFile(content, filename);
    } else {
      // Fallback download method
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
