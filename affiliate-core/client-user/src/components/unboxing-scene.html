<div id="content-unboxing-scene" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-amber-600 to-orange-500 bg-clip-text text-transparent">
        <i class="fas fa-gift mr-3"></i>Unboxing Scene
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat konten unboxing produk yang menarik dengan AI</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Upload Product Photo -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Foto Produk</h2>
          <div class="upload-area">
            <label for="unboxing-scene-image-input" class="file-input-label block border-3 border-dashed border-amber-300 rounded-xl p-8 text-center cursor-pointer hover:border-amber-500 transition-colors">
              <input type="file" id="unboxing-scene-image-input" class="hidden" accept="image/*">
              <i class="fas fa-cloud-upload-alt text-4xl text-amber-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto produk di sini</p>
            </label>
          </div>
          <div id="unboxing-scene-image-preview-container" class="hidden mt-4">
            <img id="unboxing-scene-image-preview" src="#" alt="Pratinjau Produk" class="rounded-lg w-full h-auto object-contain">
            <button id="unboxing-scene-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 2: Excitement Level -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Tingkat Kegembiraan</h2>
          
          <div id="unboxing-scene-excitement-options" class="space-y-2">
            <button type="button" data-excitement="tenang" class="excitement-btn-unboxing-scene w-full p-3 rounded-lg text-left text-sm bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent" data-selected="true">
              <i class="fas fa-spa mr-2 text-amber-500"></i>Tenang (Calm)
            </button>
            <button type="button" data-excitement="biasa" class="excitement-btn-unboxing-scene w-full p-3 rounded-lg text-left text-sm bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-meh mr-2 text-amber-500"></i>Biasa Saja (Neutral)
            </button>
            <button type="button" data-excitement="bersemangat" class="excitement-btn-unboxing-scene w-full p-3 rounded-lg text-left text-sm bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-smile mr-2 text-amber-500"></i>Bersemangat (Excited)
            </button>
            <button type="button" data-excitement="sangat-bersemangat" class="excitement-btn-unboxing-scene w-full p-3 rounded-lg text-left text-sm bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-grin-stars mr-2 text-amber-500"></i>Sangat Bersemangat (Very Excited)
            </button>
            <button type="button" data-excitement="meledak" class="excitement-btn-unboxing-scene w-full p-3 rounded-lg text-left text-sm bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-rocket mr-2 text-amber-500"></i>Meledak-ledak (Explosive!)
            </button>
          </div>
        </div>
        
        <!-- Step 3: Product Category -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Kategori Produk</h2>
          
          <div id="unboxing-scene-category-options" class="grid grid-cols-2 gap-2">
            <button type="button" data-category="elektronik" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent" data-selected="true">
              <i class="fas fa-mobile-alt mr-1 text-amber-500"></i>Elektronik
            </button>
            <button type="button" data-category="fashion" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-tshirt mr-1 text-amber-500"></i>Fashion
            </button>
            <button type="button" data-category="kecantikan" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-spa mr-1 text-amber-500"></i>Kecantikan
            </button>
            <button type="button" data-category="mainan" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-gamepad mr-1 text-amber-500"></i>Mainan
            </button>
            <button type="button" data-category="buku" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-book mr-1 text-amber-500"></i>Buku
            </button>
            <button type="button" data-category="lainnya" class="category-btn-unboxing-scene p-2 rounded-lg text-xs bg-gray-100 hover:bg-amber-100 transition border-2 border-transparent">
              <i class="fas fa-box-open mr-1 text-amber-500"></i>Lainnya
            </button>
          </div>
        </div>
        
        <!-- Step 4: Feature Highlights -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Highlight Fitur</h2>
          
          <div id="unboxing-scene-features-options" class="space-y-2">
            <label class="feature-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-feature="kemasan" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-box mr-2 ml-2 text-amber-500"></i>
              <span class="text-sm text-gray-700">Kemasan (Packaging)</span>
            </label>
            <label class="feature-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-feature="isi" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-box-open mr-2 ml-2 text-amber-500"></i>
              <span class="text-sm text-gray-700">Isi Produk (Contents)</span>
            </label>
            <label class="feature-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-feature="kualitas" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-star mr-2 ml-2 text-amber-500"></i>
              <span class="text-sm text-gray-700">Kualitas (Quality)</span>
            </label>
            <label class="feature-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-feature="harga" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-tag mr-2 ml-2 text-amber-500"></i>
              <span class="text-sm text-gray-700">Harga (Price)</span>
            </label>
            <label class="feature-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-feature="bonus" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-gift mr-2 ml-2 text-amber-500"></i>
              <span class="text-sm text-gray-700">Bonus/Gratis (Freebies)</span>
            </label>
          </div>
        </div>
        
        <!-- Step 5: Surprise/Reaction Elements -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">5. Elemen Kejutan</h2>
          
          <div id="unboxing-scene-reaction-options" class="space-y-2">
            <label class="reaction-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-reaction="wow" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-exclamation-circle mr-2 ml-2 text-orange-500"></i>
              <span class="text-sm text-gray-700">Reaksi "WOW!"</span>
            </label>
            <label class="reaction-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-reaction="suar" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-volume-up mr-2 ml-2 text-orange-500"></i>
              <span class="text-sm text-gray-700">Suara Kejutan</span>
            </label>
            <label class="reaction-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-reaction="slowmo" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-clock mr-2 ml-2 text-orange-500"></i>
              <span class="text-sm text-gray-700">Slow Motion</span>
            </label>
            <label class="reaction-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-reaction="zoom" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-search-plus mr-2 ml-2 text-orange-500"></i>
              <span class="text-sm text-gray-700">Zoom Detail</span>
            </label>
            <label class="reaction-checkbox-unboxing-scene flex items-center p-2 rounded-lg cursor-pointer hover:bg-amber-50 transition">
              <input type="checkbox" data-reaction="confetti" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
              <i class="fas fa-party-locket mr-2 ml-2 text-orange-500"></i>
              <span class="text-sm text-gray-700">Confetti</span>
            </label>
          </div>
        </div>
        
        <!-- Step 6: Generate Button -->
        <button id="unboxing-scene-generate-btn" class="w-full bg-gradient-to-r from-amber-600 to-orange-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-video mr-2"></i>Buat Unboxing Scene
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="unboxing-scene-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="unboxing-scene-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-gift text-6xl mb-4 text-amber-400"></i>
            <p class="text-xl">Hasil unboxing akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto produk dan klik Buat Unboxing Scene</p>
          </div>
          <div id="unboxing-scene-results" class="hidden grid grid-cols-1 gap-6"></div>
          <div id="unboxing-scene-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-amber-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat unboxing scene...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Unboxing Scene Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    productImage: null,
    excitementLevel: 'tenang',
    productCategory: 'elektronik',
    selectedFeatures: [],
    selectedReactions: [],
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('unboxing-scene-image-input'),
    imagePreview: document.getElementById('unboxing-scene-image-preview'),
    imagePreviewContainer: document.getElementById('unboxing-scene-image-preview-container'),
    removeImageBtn: document.getElementById('unboxing-scene-remove-image-btn'),
    excitementOptions: document.getElementById('unboxing-scene-excitement-options'),
    categoryOptions: document.getElementById('unboxing-scene-category-options'),
    featuresOptions: document.getElementById('unboxing-scene-features-options'),
    reactionOptions: document.getElementById('unboxing-scene-reaction-options'),
    generateBtn: document.getElementById('unboxing-scene-generate-btn'),
    results: document.getElementById('unboxing-scene-results'),
    emptyState: document.getElementById('unboxing-scene-empty-state'),
    loading: document.getElementById('unboxing-scene-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Excitement level selection
    elements.excitementOptions?.addEventListener('click', handleExcitementSelection);
    
    // Category selection
    elements.categoryOptions?.addEventListener('click', handleCategorySelection);
    
    // Features selection
    elements.featuresOptions?.addEventListener('change', handleFeaturesSelection);
    
    // Reactions selection
    elements.reactionOptions?.addEventListener('change', handleReactionsSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateUnboxingScene);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.productImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.productImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle excitement level selection
  function handleExcitementSelection(event) {
    const btn = event.target.closest('.excitement-btn-unboxing-scene');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.excitement-btn-unboxing-scene').forEach(b => {
      b.classList.remove('border-amber-500', 'bg-amber-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-amber-500', 'bg-amber-100');
    btn.setAttribute('data-selected', 'true');
    
    state.excitementLevel = btn.dataset.excitement || 'tenang';
    updateGenerateButton();
  }
  
  // Handle category selection
  function handleCategorySelection(event) {
    const btn = event.target.closest('.category-btn-unboxing-scene');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.category-btn-unboxing-scene').forEach(b => {
      b.classList.remove('border-amber-500', 'bg-amber-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-amber-500', 'bg-amber-100');
    btn.setAttribute('data-selected', 'true');
    
    state.productCategory = btn.dataset.category || 'elektronik';
    updateGenerateButton();
  }
  
  // Handle features selection
  function handleFeaturesSelection(event) {
    const checkboxes = document.querySelectorAll('.feature-checkbox-unboxing-scene input[type="checkbox"]:checked');
    state.selectedFeatures = Array.from(checkboxes).map(cb => cb.dataset.feature);
    updateGenerateButton();
  }
  
  // Handle reactions selection
  function handleReactionsSelection(event) {
    const checkboxes = document.querySelectorAll('.reaction-checkbox-unboxing-scene input[type="checkbox"]:checked');
    state.selectedReactions = Array.from(checkboxes).map(cb => cb.dataset.reaction);
    updateGenerateButton();
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.productImage !== null;
    const hasExcitement = state.excitementLevel !== '';
    const hasCategory = state.productCategory !== '';
    const hasFeatures = state.selectedFeatures.length > 0;
    
    elements.generateBtn.disabled = !hasImage || !hasExcitement || !hasCategory || !hasFeatures || state.isGenerating;
  }
  
  // Generate unboxing scene
  async function generateUnboxingScene() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.productImage.base64, state.productImage.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    // Excitement descriptions
    const excitementDescriptions = {
      'tenang': 'calm and composed, showing the product in a relaxed manner',
      'biasa': 'neutral reaction, casual unboxing style',
      'bersemangat': 'enthusiastic and excited, showing genuine interest',
      'sangat-bersemangat': 'very excited, showing high energy and enthusiasm',
      'meledak': 'explosive excitement, dramatic reaction, over-the-top enthusiasm'
    };
    
    // Category descriptions
    const categoryDescriptions = {
      'elektronik': 'electronic device (gadget, phone, laptop)',
      'fashion': 'fashion item (clothing, shoes, bag)',
      'kecantikan': 'beauty product (skincare, makeup)',
      'mainan': 'toy or collectible item',
      'buku': 'book or comic',
      'lainnya': 'other product'
    };
    
    // Feature descriptions
    const featureDescriptions = {
      'kemasan': 'highlight the packaging quality and design',
      'isi': 'show the product contents and what\'s inside',
      'kualitas': 'emphasize the quality and build of the product',
      'harga': 'mention the price and value for money',
      'bonus': 'show any freebies or bonus items included'
    };
    
    // Reaction descriptions
    const reactionDescriptions = {
      'wow': 'include a "WOW!" reaction moment',
      'suar': 'add surprise sound effects',
      'slowmo': 'use slow motion for dramatic effect',
      'zoom': 'include zoom-in shots for details',
      'confetti': 'add confetti or celebration effects'
    };
    
    const excitementDesc = excitementDescriptions[state.excitementLevel] || 'neutral';
    const categoryDesc = categoryDescriptions[state.productCategory] || 'product';
    
    const featuresDesc = state.selectedFeatures
      .map(f => featureDescriptions[f])
      .filter(Boolean)
      .join(', ');
    
    const reactionsDesc = state.selectedReactions
      .map(r => reactionDescriptions[r])
      .filter(Boolean)
      .join(', ');
    
    return `Create an engaging unboxing scene video/script for this product with the following specifications:

Product type: ${categoryDesc}
Excitement level: ${excited ${state.excitementLevel} - ${excitementDesc}}
Features to highlight: ${featuresDesc || 'general product showcase'}
Special effects: ${reactionsDesc || 'standard unboxing'}

Create a dynamic unboxing content that includes:
1. Opening shot with product packaging
2. Unboxing sequence with ${state.excitementLevel} excitement
3. Product reveal with ${state.selectedReactions.length > 0 ? state.selectedReactions.join(', ') : 'standard presentation'}
4. Feature showcase focusing on ${state.selectedFeatures.join(', ') || 'key product features'}
5. Closing reaction and summary

Make it engaging, visually appealing, and suitable for social media content. Return the detailed unboxing scene description and visual guidance.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      // Check for image data
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (imageData) {
        const mimeType = response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || 'image/png';
        
        return {
          type: 'image',
          data: imageData,
          mimeType: mimeType
        };
      }
      
      // Check for text response
      const textData = response.candidates?.[0]?.content?.parts?.find(part => part.text)?.text;
      
      if (textData) {
        return {
          type: 'text',
          data: textData
        };
      }
      
      throw new Error('No valid data in response');
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      const filename = `unboxing-scene.${result.mimeType.split('/')[1] || 'png'}`;
      
      elements.results.innerHTML = `
        <div class="col-span-1">
          <div class="bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-6 border border-amber-200">
            <h3 class="font-semibold text-lg text-amber-800 mb-4">Hasil Unboxing Scene</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="Unboxing Scene Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="unboxing-scene-download-btn" data-image-url="${imageUrl}" data-filename="${filename}" class="bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
                <button id="unboxing-scene-copy-btn" data-image-url="${imageUrl}" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition-colors shadow-lg">
                  <i class="fas fa-copy mr-2"></i>Copy
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('unboxing-scene-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
      
      // Add copy functionality
      const copyBtn = document.getElementById('unboxing-scene-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const imageUrl = copyBtn.dataset.imageUrl;
          try {
            // Convert data URL to blob for clipboard
            const response = await fetch(imageUrl);
            const blob = await response.blob();
            await navigator.clipboard.write([
              new ClipboardItem({
                [blob.type]: blob
              })
            ]);
            showToast('Gambar berhasil disalin ke clipboard!');
          } catch (error) {
            showToast('Gagal menyalin gambar');
          }
        });
      }
    } else if (result.type === 'text') {
      elements.results.innerHTML = `
        <div class="col-span-1 bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-6 border border-amber-200">
          <h3 class="font-semibold text-lg text-amber-800 mb-4">Unboxing Scene Script</h3>
          <div class="prose prose-amber max-w-none">
            ${result.data}
          </div>
          <div class="mt-4 flex gap-2">
            <button id="unboxing-scene-copy-script-btn" class="bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 transition-colors shadow-lg">
              <i class="fas fa-copy mr-2"></i>Copy Script
            </button>
          </div>
        </div>
      `;
      
      // Add copy script functionality
      const copyScriptBtn = document.getElementById('unboxing-scene-copy-script-btn');
      if (copyScriptBtn) {
        copyScriptBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(result.data);
          showToast('Script berhasil disalin!');
        });
      }
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
