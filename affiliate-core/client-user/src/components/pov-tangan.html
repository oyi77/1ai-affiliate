<div id="content-pov-tangan" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
        <i class="fas fa-hand-paper mr-3"></i>POV Tangan
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat foto POV tangan yang menarik dengan AI</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Image Upload -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Unggah Foto</h2>
          <div class="upload-area">
            <label for="pov-tangan-image-input" class="file-input-label block border-3 border-dashed border-indigo-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-500 transition-colors">
              <input type="file" id="pov-tangan-image-input" class="hidden" accept="image/*">
              <i class="fas fa-camera text-4xl text-indigo-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto di sini</p>
            </label>
          </div>
          <div id="pov-tangan-image-preview-container" class="hidden mt-4 relative">
            <img id="pov-tangan-image-preview" src="#" alt="Pratinjau Foto" class="rounded-lg w-full h-auto object-contain">
            <button id="pov-tangan-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 2: POV Type Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Jenis POV</h2>
          <div id="pov-tangan-type-options" class="grid grid-cols-1 gap-3">
            <button type="button" data-type="holding" class="pov-type-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-indigo-100 hover:bg-indigo-200 transition text-center border-2 border-indigo-400 selected" data-selected="true">
              <i class="fas fa-hand-holding mr-2"></i>Tangan Memegang
            </button>
            <button type="button" data-type="using" class="pov-type-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-hand-pointer mr-2"></i>Tangan Menggunakan
            </button>
            <button type="button" data-type="showing" class="pov-type-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-hand-point-up mr-2"></i>Tangan Menunjukkan
            </button>
            <button type="button" data-type="product" class="pov-type-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-box-open mr-2"></i>POV Produk
            </button>
            <button type="button" data-type="object" class="pov-type-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-cube mr-2"></i>POV Objek
            </button>
          </div>
        </div>
        
        <!-- Step 3: Angle Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Sudut Pandang</h2>
          <div id="pov-tangan-angle-options" class="grid grid-cols-2 gap-3">
            <button type="button" data-angle="top-down" class="pov-angle-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-indigo-100 hover:bg-indigo-200 transition text-center border-2 border-indigo-400 selected" data-selected="true">
              <i class="fas fa-arrow-down mb-1 mr-1"></i><br>Atas
            </button>
            <button type="button" data-angle="side-view" class="pov-angle-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-arrows-alt-h mb-1 mr-1"></i><br>Samping
            </button>
            <button type="button" data-angle="close-up" class="pov-angle-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-search mb-1 mr-1"></i><br>Dekat
            </button>
            <button type="button" data-angle="wide" class="pov-angle-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-expand mb-1 mr-1"></i><br>Lebar
            </button>
          </div>
        </div>
        
        <!-- Step 4: Lighting Condition -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Kondisi Pencahayaan</h2>
          <div id="pov-tangan-lighting-options" class="grid grid-cols-1 gap-3">
            <button type="button" data-lighting="natural" class="pov-lighting-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-indigo-100 hover:bg-indigo-200 transition text-center border-2 border-indigo-400 selected" data-selected="true">
              <i class="fas fa-sun mr-2"></i>Natural (Cahaya Alami)
            </button>
            <button type="button" data-lighting="softbox" class="pov-lighting-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-lightbulb mr-2"></i>Softbox
            </button>
            <button type="button" data-lighting="ring-light" class="pov-lighting-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-circle-notch mr-2"></i>Ring Light
            </button>
            <button type="button" data-lighting="backlight" class="pov-lighting-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-adjust mr-2"></i>Backlight
            </button>
            <button type="button" data-lighting="mixed" class="pov-lighting-btn-pov-tangan w-full p-3 rounded-lg text-sm bg-gray-100 hover:bg-indigo-100 transition text-center border-2 border-transparent">
              <i class="fas fa-layer-group mr-2"></i>Mixed
            </button>
          </div>
        </div>
        
        <!-- Step 5: Background Description -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">5. Deskripsi Latar Belakang</h2>
          <div>
            <label for="pov-tangan-background-description" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fas fa-paint-brush mr-1 text-indigo-500"></i>Deskripsi (opsional)
            </label>
            <textarea id="pov-tangan-background-description" rows="3" class="w-full p-3 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors resize-none" placeholder="Contoh: Latar belakang studio minimalis dengan warna pastel, atau latar belakang outdoor dengan pemandangan alam..."></textarea>
          </div>
        </div>
        
        <!-- Step 6: Generate Button -->
        <button id="pov-tangan-generate-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat POV Tangan
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="pov-tangan-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="pov-tangan-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-hand-paper text-6xl mb-4 text-indigo-400"></i>
            <p class="text-xl">Hasil akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto dan pilih opsi, lalu klik Buat POV Tangan</p>
          </div>
          <div id="pov-tangan-results" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
          <div id="pov-tangan-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-indigo-600 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat POV tangan...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// POV Tangan Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    image: null,
    povType: 'holding',
    angle: 'top-down',
    lighting: 'natural',
    backgroundDescription: '',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('pov-tangan-image-input'),
    imagePreview: document.getElementById('pov-tangan-image-preview'),
    imagePreviewContainer: document.getElementById('pov-tangan-image-preview-container'),
    removeImageBtn: document.getElementById('pov-tangan-remove-image-btn'),
    typeOptions: document.getElementById('pov-tangan-type-options'),
    angleOptions: document.getElementById('pov-tangan-angle-options'),
    lightingOptions: document.getElementById('pov-tangan-lighting-options'),
    backgroundDescription: document.getElementById('pov-tangan-background-description'),
    generateBtn: document.getElementById('pov-tangan-generate-btn'),
    results: document.getElementById('pov-tangan-results'),
    emptyState: document.getElementById('pov-tangan-empty-state'),
    loading: document.getElementById('pov-tangan-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // POV type selection
    elements.typeOptions?.addEventListener('click', handleTypeSelection);
    
    // Angle selection
    elements.angleOptions?.addEventListener('click', handleAngleSelection);
    
    // Lighting selection
    elements.lightingOptions?.addEventListener('click', handleLightingSelection);
    
    // Background description
    elements.backgroundDescription?.addEventListener('input', handleBackgroundDescription);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generatePOV);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.image = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.image = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle POV type selection
  function handleTypeSelection(event) {
    const btn = event.target.closest('.pov-type-btn-pov-tangan');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.pov-type-btn-pov-tangan').forEach(b => {
      b.classList.remove('border-indigo-400', 'bg-indigo-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-indigo-400', 'bg-indigo-100');
    btn.setAttribute('data-selected', 'true');
    
    state.povType = btn.dataset.type || 'holding';
    updateGenerateButton();
  }
  
  // Handle angle selection
  function handleAngleSelection(event) {
    const btn = event.target.closest('.pov-angle-btn-pov-tangan');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.pov-angle-btn-pov-tangan').forEach(b => {
      b.classList.remove('border-indigo-400', 'bg-indigo-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-indigo-400', 'bg-indigo-100');
    btn.setAttribute('data-selected', 'true');
    
    state.angle = btn.dataset.angle || 'top-down';
    updateGenerateButton();
  }
  
  // Handle lighting selection
  function handleLightingSelection(event) {
    const btn = event.target.closest('.pov-lighting-btn-pov-tangan');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.pov-lighting-btn-pov-tangan').forEach(b => {
      b.classList.remove('border-indigo-400', 'bg-indigo-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-indigo-400', 'bg-indigo-100');
    btn.setAttribute('data-selected', 'true');
    
    state.lighting = btn.dataset.lighting || 'natural';
    updateGenerateButton();
  }
  
  // Handle background description
  function handleBackgroundDescription(event) {
    state.backgroundDescription = event.target.value || '';
    updateGenerateButton();
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.image !== null;
    elements.generateBtn.disabled = !hasImage || state.isGenerating;
  }
  
  // Generate POV
  async function generatePOV() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.image.base64, state.image.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const povTypeDescriptions = {
      'holding': 'hand holding product/object',
      'using': 'hand using product/object',
      'showing': 'hand showing product/object',
      'product': 'product POV shot',
      'object': 'object POV shot'
    };
    
    const angleDescriptions = {
      'top-down': 'top-down angle (bird\'s eye view)',
      'side-view': 'side view angle',
      'close-up': 'close-up shot',
      'wide': 'wide shot'
    };
    
    const lightingDescriptions = {
      'natural': 'natural lighting conditions',
      'softbox': 'softbox studio lighting',
      'ring-light': 'ring light lighting',
      'backlight': 'backlight setup',
      'mixed': 'mixed lighting conditions'
    };
    
    const povType = povTypeDescriptions[state.povType] || 'hand holding product/object';
    const angle = angleDescriptions[state.angle] || 'top-down angle';
    const lighting = lightingDescriptions[state.lighting] || 'natural lighting conditions';
    const background = state.backgroundDescription ? `Background: ${state.backgroundDescription}` : 'Clean, professional background';
    
    return `Create a POV (Point of View) image with the following specifications:

POV Type: ${povType}
Camera Angle: ${angle}
Lighting: ${lighting}
${background}

Requirements:
1. Professional product photography style
2. Clean and appealing composition
3. Proper lighting that highlights the subject
4. Suitable for e-commerce or marketing use
5. High quality, detailed image

Return the enhanced POV image.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (!imageData) {
        throw new Error('No image data in response');
      }
      
      return {
        type: 'image',
        data: imageData,
        mimeType: response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || 'image/png'
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      elements.results.innerHTML = `
        <div class="col-span-2">
          <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl p-6 border border-indigo-200">
            <h3 class="font-semibold text-lg text-indigo-800 mb-4">POV Tangan Hasil AI</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="POV Tangan Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="pov-tangan-download-btn" data-image-url="${imageUrl}" data-filename="pov-tangan-result.png" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('pov-tangan-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl p-6 border border-indigo-200">
          <h3 class="font-semibold text-lg text-indigo-800 mb-4">Hasil</h3>
          <div class="prose prose-indigo max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
