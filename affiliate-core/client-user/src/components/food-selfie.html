        <!-- Step 3: Enhancement Options -->

                  <span class="mt-1 block">Vintage</span>
                </button>
                <button type="button" data-filter="crisp" class="filter-btn-food-selfie p-2 rounded-lg text-xs bg-gray-100 hover:bg-emerald-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-gray-200"></div>
                  <span class="mt-1 block">Crisp</span>
                </button>
                <button type="button" data-filter="food" class="filter-btn-food-selfie p-2 rounded-lg text-xs bg-gray-100 hover:bg-emerald-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-green-100"></div>
                  <span class="mt-1 block">Food</span>
                </button>
                <button type="button" data-filter="dramatic" class="filter-btn-food-selfie p-2 rounded-lg text-xs bg-gray-100 hover:bg-emerald-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-gray-800"></div>
                  <span class="mt-1 block">Dramatic</span>
                </button>
                <button type="button" data-filter="bright" class="filter-btn-food-selfie p-2 rounded-lg text-xs bg-gray-100 hover:bg-emerald-100 transition border-2 border-transparent">
                  <div class="w-8 h-8 rounded bg-white border-2 border-emerald-400"></div>

              </div>
            </div>
          </div>
        </div>
        
        <!-- Step 4: Generate Button -->
        <button id="food-selfie-generate-btn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Food Selfie
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="food-selfie-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="food-selfie-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-utensils text-6xl mb-4 text-emerald-400"></i>
            <p class="text-xl">Hasil akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto makanan dan klik Buat Food Selfie</p>
          </div>
          <div id="food-selfie-results" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
          <div id="food-selfie-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-emerald-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat food selfie...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Food Selfie Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    foodImage: null,
    selectedCategory: '',
    brightness: 100,
    saturation: 100,
    selectedFilter: 'none',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('food-selfie-image-input'),
    imagePreview: document.getElementById('food-selfie-image-preview'),
    imagePreviewContainer: document.getElementById('food-selfie-image-preview-container'),
    removeImageBtn: document.getElementById('food-selfie-remove-image-btn'),
    categoryOptions: document.getElementById('food-selfie-category-options'),
    brightnessSlider: document.getElementById('food-selfie-brightness'),
    brightnessValue: document.getElementById('food-selfie-brightness-value'),
    saturationSlider: document.getElementById('food-selfie-saturation'),
    saturationValue: document.getElementById('food-selfie-saturation-value'),
    filterOptions: document.getElementById('food-selfie-filter-options'),
    generateBtn: document.getElementById('food-selfie-generate-btn'),
    results: document.getElementById('food-selfie-results'),
    emptyState: document.getElementById('food-selfie-empty-state'),
    loading: document.getElementById('food-selfie-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Category selection
    elements.categoryOptions?.addEventListener('click', handleCategorySelection);
    
    // Brightness slider
    elements.brightnessSlider?.addEventListener('input', handleBrightnessChange);
    
    // Saturation slider
    elements.saturationSlider?.addEventListener('input', handleSaturationChange);
    
    // Filter selection
    elements.filterOptions?.addEventListener('click', handleFilterSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateFoodSelfie);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.foodImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.foodImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle category selection
  function handleCategorySelection(event) {
    const btn = event.target.closest('.category-btn-food-selfie');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.category-btn-food-selfie').forEach(b => {
      b.classList.remove('border-emerald-500', 'bg-emerald-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-emerald-500', 'bg-emerald-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedCategory = btn.dataset.category || '';
    updateGenerateButton();
  }
  
  // Handle brightness change
  function handleBrightnessChange(event) {
    const value = event.target.value;
    state.brightness = parseInt(value, 10);
    
    // Update display value
    if (value < 80) {
      elements.brightnessValue.textContent = 'Gelap';
    } else if (value > 120) {
      elements.brightnessValue.textContent = 'Terang';
    } else {
      elements.brightnessValue.textContent = 'Normal';
    }
    
    // Apply preview effect
    applyPreviewEffect();
  }
  
  // Handle saturation change
  function handleSaturationChange(event) {
    const value = event.target.value;
    state.saturation = parseInt(value, 10);
    
    // Update display value
    if (value < 80) {
      elements.saturationValue.textContent = 'Putih';
    } else if (value > 120) {
      elements.saturationValue.textContent = 'Vibrant';
    } else {
      elements.saturationValue.textContent = 'Normal';
    }
    
    // Apply preview effect
    applyPreviewEffect();
  }
  
  // Handle filter selection
  function handleFilterSelection(event) {
    const btn = event.target.closest('.filter-btn-food-selfie');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.filter-btn-food-selfie').forEach(b => {
      b.classList.remove('border-emerald-500', 'bg-emerald-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-emerald-500', 'bg-emerald-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedFilter = btn.dataset.filter || 'none';
    
    // Apply preview effect
    applyPreviewEffect();
  }
  
  // Apply preview effect to image
  function applyPreviewEffect() {
    if (!elements.imagePreview.src || elements.imagePreview.src === '#') return;
    
    // Apply CSS filters based on state
    let filterString = '';
    
    // Brightness
    filterString += `brightness(${state.brightness}%) `;
    
    // Saturation
    filterString += `saturate(${state.saturation}%) `;
    
    // Apply filter
    switch (state.selectedFilter) {
      case 'warm':
        filterString += 'sepia(30%) contrast(110%)';
        break;
      case 'cool':
        filterString += 'hue-rotate(15deg) contrast(110%)';
        break;
      case 'vintage':
        filterString += 'sepia(40%) contrast(90%) brightness(90%)';
        break;
      case 'crisp':
        filterString += 'contrast(120%) saturate(110%)';
        break;
      case 'food':
        filterString += 'saturate(130%) contrast(110%) brightness(105%)';
        break;
      case 'dramatic':
        filterString += 'contrast(140%) brightness(90%) saturate(120%)';
        break;
      case 'bright':
        filterString += 'brightness(115%) contrast(105%)';
        break;
      default:
        // Normal - no additional filter
        break;
    }
    
    elements.imagePreview.style.filter = filterString;
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.foodImage !== null;
    elements.generateBtn.disabled = !hasImage || state.isGenerating;
  }
  
  // Generate food selfie
  async function generateFoodSelfie() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.foodImage.base64, state.foodImage.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const category = state.selectedCategory || 'Professional food photography';
    const brightness = state.brightness;
    const saturation = state.saturation;
    const filter = state.selectedFilter;
    
    let filterDescription = '';
    switch (filter) {
      case 'warm':
        filterDescription = 'warm tones, cozy atmosphere';
        break;
      case 'cool':
        filterDescription = 'cool tones, fresh look';
        break;
      case 'vintage':
        filterDescription = 'vintage/retro style, nostalgic feel';
        break;
      case 'crisp':
        filterDescription = 'crisp, sharp details';
        break;
      case 'food':
        filterDescription = 'appetizing food photography, vibrant colors';
        break;
      case 'dramatic':
        filterDescription = 'dramatic lighting, high contrast';
        break;
      case 'bright':
        filterDescription = 'bright, airy, clean look';
        break;
      default:
        filterDescription = 'natural, balanced look';
        break;
    }
    
    return `Enhance this food photo with the following specifications:
    
Category/Style: ${category}
Brightness adjustment: ${brightness}%
Saturation adjustment: ${saturation}%
Filter effect: ${filterDescription}

Create an enhanced, professional food photograph that:
1. Makes the food look appetizing and appealing
2. Has proper lighting and color balance
3. Is suitable for social media (Instagram, TikTok, etc.)
4. Highlights the food's best features
5. Has a cohesive and attractive presentation

Return the enhanced image.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (!imageData) {
        throw new Error('No image data in response');
      }
      
      return {
        type: 'image',
        data: imageData,
        mimeType: response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || 'image/png'
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      elements.results.innerHTML = `
        <div class="col-span-2">
          <div class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
            <h3 class="font-semibold text-lg text-emerald-800 mb-4">Food Selfie Hasil AI</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="Food Selfie Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="food-selfie-download-btn" data-image-url="${imageUrl}" data-filename="food-selfie-result.png" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('food-selfie-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
          <h3 class="font-semibold text-lg text-emerald-800 mb-4">Hasil</h3>
          <div class="prose prose-emerald max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
