<div id="content-product-ads" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-violet-500 bg-clip-text text-transparent">
        <i class="fas fa-bullhorn mr-3"></i>Iklan Produk
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat konten iklan produk yang menarik dengan bantuan AI</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Upload Product Photo -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Foto Produk</h2>
          <div class="upload-area">
            <label for="product-ads-image-input" class="file-input-label block text-sm border-3 border-dashed border-purple-300 rounded-xl p-8 text-center cursor-pointer hover:border-purple-500 transition-colors">
              <input type="file" id="product-ads-image-input" class="hidden" accept="image/*">
              <i class="fas fa-camera text-4xl text-purple-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto produk di sini</p>
            </label>
          </div>
          <div id="product-ads-image-preview-container" class="hidden mt-4">
            <img id="product-ads-image-preview" src="#" alt="Pratinjau Produk" class="rounded-lg w-full h-auto object-contain">
            <button id="product-ads-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 2: Product Information -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Informasi Produk</h2>
          
          <div class="space-y-4">
            <!-- Product Name -->
            <div>
              <label for="product-ads-name" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-tag mr-1 text-purple-500"></i>Nama Produk
              </label>
              <input type="text" id="product-ads-name" placeholder="Contoh: Samsung Galaxy S24 Ultra" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Product Description -->
            <div>
              <label for="product-ads-description" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-align-left mr-1 text-purple-500"></i>Deskripsi Produk
              </label>
              <textarea id="product-ads-description" rows="3" placeholder="Jelaskan produk Anda secara singkat..."
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
            
            <!-- Price -->
            <div>
              <label for="product-ads-price" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-tag mr-1 text-purple-500"></i>Harga (Rp)
              </label>
              <input type="text" id="product-ads-price" placeholder="Contoh: 15.000.000" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            
            <!-- Discount Price (Optional) -->
            <div>
              <label for="product-ads-discount" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-percent mr-1 text-purple-500"></i>Harga Diskon (Rp) - Opsional
              </label>
              <input type="text" id="product-ads-discount" placeholder="Contoh: 12.000.000" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
          </div>
        </div>
        
        <!-- Step 3: Ad Platform Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Platform Iklan</h2>
          <div id="product-ads-platform-options" class="grid grid-cols-2 gap-2">
            <button type="button" data-platform="instagram" class="platform-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent selected" data-selected="true">
              <i class="fab fa-instagram text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">Instagram</span>
            </button>
            <button type="button" data-platform="tiktok" class="platform-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-tiktok text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">TikTok</span>
            </button>
            <button type="button" data-platform="facebook" class="platform-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-facebook text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">Facebook</span>
            </button>
            <button type="button" data-platform="youtube" class="platform-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-center border-2 border-transparent">
              <i class="fab fa-youtube text-2xl mb-1 text-purple-500"></i>
              <span class="block font-medium">YouTube</span>
            </button>
          </div>
        </div>
        
        <!-- Step 4: CTA Button Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Tombol CTA</h2>
          <div id="product-ads-cta-options" class="grid grid-cols-1 gap-2">
            <button type="button" data-cta="beli_sekarang" class="cta-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-shopping-cart mr-2 text-purple-500"></i>
              <span class="font-medium">Beli Sekarang</span>
            </button>
            <button type="button" data-cta="daftar_sekarang" class="cta-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-user-plus mr-2 text-purple-500"></i>
              <span class="font-medium">Daftar Sekarang</span>
            </button>
            <button type="button" data-cta="pelajari_lebih_lanjut" class="cta-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-info-circle mr-2 text-purple-500"></i>
              <span class="font-medium">Pelajari Lebih Lanjut</span>
            </button>
            <button type="button" data-cta="hubungi_kami" class="cta-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-envelope mr-2 text-purple-500"></i>
              <span class="font-medium">Hubungi Kami</span>
            </button>
            <button type="button" data-cta="dapatkan_diskon" class="cta-btn-product-ads p-3 rounded-lg text-sm bg-gray-100 hover:bg-purple-100 transition text-left border-2 border-transparent">
              <i class="fas fa-tag mr-2 text-purple-500"></i>
              <span class="font-medium">Dapatkan Diskon</span>
            </button>
          </div>
        </div>
        
        <!-- Step 5: Target Audience -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">5. Target Audiens</h2>
          
          <div class="space-y-4">
            <!-- Age Range -->
            <div>
              <label for="product-ads-age" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-users mr-1 text-purple-500"></i>Rentang Usia
              </label>
              <select id="product-ads-age" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="all">Semua Usia</option>
                <option value="18-24">18-24 tahun</option>
                <option value="25-34">25-34 tahun</option>
                <option value="35-44">35-44 tahun</option>
                <option value="45-54">45-54 tahun</option>
                <option value="55+">55 tahun ke atas</option>
              </select>
            </div>
            
            <!-- Gender -->
            <div>
              <label for="product-ads-gender" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-venus-mars mr-1 text-purple-500"></i>Jenis Kelamin
              </label>
              <select id="product-ads-gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="all">Semua Jenis Kelamin</option>
                <option value="male">Laki-laki</option>
                <option value="female">Perempuan</option>
              </select>
            </div>
            
            <!-- Interests -->
            <div>
              <label for="product-ads-interests" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-heart mr-1 text-purple-500"></i>Minat (pisahkan dengan koma)
              </label>
              <textarea id="product-ads-interests" rows="2" placeholder="Contoh: teknologi, gaming, fashion, kesehatan"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>
          </div>
        </div>
        
        <!-- Step 6: Generate Button -->
        <button id="product-ads-generate-btn" class="w-full bg-gradient-to-r from-purple-600 to-violet-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Iklan
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="product-ads-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="product-ads-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-bullhorn text-6xl mb-4 text-purple-400"></i>
            <p class="text-xl">Hasil iklan akan muncul di sini</p>
            <p class="text-sm mt-2">Isi informasi produk dan klik Buat Iklan</p>
          </div>
          <div id="product-ads-results" class="hidden space-y-6"></div>
          <div id="product-ads-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-purple-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat iklan...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Product Ads Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    productImage: null,
    productName: '',
    description: '',
    price: '',
    discount: '',
    selectedPlatform: 'instagram',
    selectedCTA: 'beli_sekarang',
    targetAge: 'all',
    targetGender: 'all',
    interests: '',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('product-ads-image-input'),
    imagePreview: document.getElementById('product-ads-image-preview'),
    imagePreviewContainer: document.getElementById('product-ads-image-preview-container'),
    removeImageBtn: document.getElementById('product-ads-remove-image-btn'),
    productNameInput: document.getElementById('product-ads-name'),
    descriptionInput: document.getElementById('product-ads-description'),
    priceInput: document.getElementById('product-ads-price'),
    discountInput: document.getElementById('product-ads-discount'),
    platformOptions: document.getElementById('product-ads-platform-options'),
    ctaOptions: document.getElementById('product-ads-cta-options'),
    ageSelect: document.getElementById('product-ads-age'),
    genderSelect: document.getElementById('product-ads-gender'),
    interestsInput: document.getElementById('product-ads-interests'),
    generateBtn: document.getElementById('product-ads-generate-btn'),
    results: document.getElementById('product-ads-results'),
    emptyState: document.getElementById('product-ads-empty-state'),
    loading: document.getElementById('product-ads-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Product info inputs
    elements.productNameInput?.addEventListener('input', updateGenerateButton);
    elements.descriptionInput?.addEventListener('input', updateGenerateButton);
    elements.priceInput?.addEventListener('input', updateGenerateButton);
    elements.discountInput?.addEventListener('input', updateGenerateButton);
    
    // Platform selection
    elements.platformOptions?.addEventListener('click', handlePlatformSelection);
    
    // CTA selection
    elements.ctaOptions?.addEventListener('click', handleCTASelection);
    
    // Target audience inputs
    elements.ageSelect?.addEventListener('change', updateGenerateButton);
    elements.genderSelect?.addEventListener('change', updateGenerateButton);
    elements.interestsInput?.addEventListener('input', updateGenerateButton);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateAd);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.productImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.productImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle platform selection
  function handlePlatformSelection(event) {
    const btn = event.target.closest('.platform-btn-product-ads');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.platform-btn-product-ads').forEach(b => {
      b.classList.remove('border-purple-500', 'bg-purple-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-purple-500', 'bg-purple-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedPlatform = btn.dataset.platform || 'instagram';
  }
  
  // Handle CTA selection
  function handleCTASelection(event) {
    const btn = event.target.closest('.cta-btn-product-ads');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.cta-btn-product-ads').forEach(b => {
      b.classList.remove('border-purple-500', 'bg-purple-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-purple-500', 'bg-purple-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedCTA = btn.dataset.cta || 'beli_sekarang';
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    // Update state from inputs
    state.productName = elements.productNameInput?.value || '';
    state.description = elements.descriptionInput?.value || '';
    state.price = elements.priceInput?.value || '';
    state.discount = elements.discountInput?.value || '';
    state.targetAge = elements.ageSelect?.value || 'all';
    state.targetGender = elements.genderSelect?.value || 'all';
    state.interests = elements.interestsInput?.value || '';
    
    const hasRequiredInfo = state.productName.trim() !== '' && 
                           state.description.trim() !== '' &&
                           state.price.trim() !== '';
    
    elements.generateBtn.disabled = !hasRequiredInfo || state.isGenerating;
  }
  
  // Generate ad
  async function generateAd() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiReview(prompt);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const platform = state.selectedPlatform;
    const cta = state.selectedCTA;
    
    // Platform-specific instructions
    let platformInstructions = '';
    let contentType = '';
    
    switch (platform) {
      case 'instagram':
        platformInstructions = 'Create an engaging Instagram caption with relevant hashtags. Make it visually appealing and shareable.';
        contentType = 'Caption Instagram';
        break;
      case 'tiktok':
        platformInstructions = 'Create a catchy TikTok script with trending hooks and hashtags. Make it entertaining and engaging for short-form video.';
        contentType = 'Script TikTok';
        break;
      case 'facebook':
        platformInstructions = 'Create a Facebook post with engaging copy and clear CTA. Make it shareable and community-friendly.';
        contentType = 'Post Facebook';
        break;
      case 'youtube':
        platformInstructions = 'Create a YouTube video description with timestamps, links, and compelling content. Include cards and end screen suggestions.';
        contentType = 'Deskripsi YouTube';
        break;
    }
    
    // CTA mapping
    const ctaTexts = {
      'beli_sekarang': 'Beli Sekarang',
      'daftar_sekarang': 'Daftar Sekarang',
      'pelajari_lebih_lanjut': 'Pelajari Lebih Lanjut',
      'hubungi_kami': 'Hubungi Kami',
      'dapatkan_diskon': 'Dapatkan Diskon'
    };
    
    // Target audience description
    let targetAudience = '';
    if (state.targetAge !== 'all') {
      targetAudience += `Usia ${state.targetAge} tahun`;
    }
    if (state.targetGender !== 'all') {
      targetAudience += targetAudience ? ' ' : '';
      targetAudience += state.targetGender === 'male' ? 'Laki-laki' : 'Perempuan';
    }
    if (state.interests.trim()) {
      targetAudience += targetAudience ? ', minat: ' : 'Minat: ';
      targetAudience += state.interests;
    }
    if (!targetAudience) {
      targetAudience = 'Semua audiens';
    }
    
    // Price display
    let priceDisplay = state.price;
    if (state.discount.trim()) {
      priceDisplay = `${state.discount} (diskon dari ${state.price})`;
    }
    
    return `Create a ${contentType} for advertising a product with the following details:

Product Name: ${state.productName}
Description: ${state.description}
Price: ${priceDisplay}
CTA Button: ${ctaTexts[cta] || 'Beli Sekarang'}

Target Audience: ${targetAudience}

Platform: ${platformInstructions}

Requirements:
1. Write in Indonesian language
2. Make it compelling and persuasive
3. Include the product name and key benefits
4. Match the style and format appropriate for ${platform}
5. Include relevant hashtags where appropriate
6. End with a clear call-to-action: ${ctaTexts[cta] || 'Beli Sekarang'}
7. Make it engaging and attention-grabbing

Please generate the complete ${contentType} content.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const text = response.candidates?.[0]?.content?.parts?.find(part => part.text)?.text;
      
      if (!text) {
        throw new Error('No text data in response');
      }
      
      return {
        type: 'text',
        content: text,
        platform: state.selectedPlatform
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'text') {
      // Format the content with proper styling
      const formattedContent = formatAdContent(result.content, result.platform);
      
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-semibold text-lg text-purple-800">Hasil Iklan AI</h3>
            <div class="flex gap-2">
              <button id="product-ads-copy-btn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors shadow-lg text-sm">
                <i class="fas fa-copy mr-2"></i>Salin
              </button>
              <button id="product-ads-download-btn" class="bg-violet-600 text-white px-4 py-2 rounded-lg hover:bg-violet-700 transition-colors shadow-lg text-sm">
                <i class="fas fa-download mr-2"></i>Unduh
              </button>
            </div>
          </div>
          <div id="product-ads-content" class="prose prose-purple max-w-none">
            ${formattedContent}
          </div>
        </div>
      `;
      
      // Add copy functionality
      const copyBtn = document.getElementById('product-ads-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const content = result.content;
          if (window.copyToClipboard) {
            await window.copyToClipboard(content, copyBtn);
          }
        });
      }
      
      // Add download functionality
      const downloadBtn = document.getElementById('product-ads-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', () => {
          downloadContent(result.content, result.platform);
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-6 border border-purple-200">
          <h3 class="font-semibold text-lg text-purple-800 mb-4">Hasil</h3>
          <div class="prose prose-purple max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Format ad content
  function formatAdContent(content, platform) {
    // Basic formatting - convert line breaks to paragraphs
    let formatted = content
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    
    return `<p>${formatted}</p>`;
  }
  
  // Download content as text file
  function downloadContent(content, platform) {
    const platformNames = {
      'instagram': 'instagram',
      'tiktok': 'tiktok',
      'facebook': 'facebook',
      'youtube': 'youtube'
    };
    
    const filename = `iklan-${platformNames[platform] || 'produk'}-${Date.now()}.txt`;
    
    if (window.downloadTextFile) {
      window.downloadTextFile(content, filename);
    } else {
      // Fallback download method
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
