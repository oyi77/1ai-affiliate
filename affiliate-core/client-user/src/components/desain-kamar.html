<div id="content-desain-kamar" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-amber-500 via-orange-500 to-amber-600 bg-clip-text text-transparent">
        <i class="fas fa-bed mr-3"></i>Desain Kamar
      </h1>
      <p class="text-lg text-gray-600 mt-2">Buat inspirasi desain kamar yang nyaman dan estetis</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Bedroom Type -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Jenis Kamar</h2>
          <div id="desain-kamar-type-options" class="grid grid-cols-2 gap-2">
            <button type="button" data-type="master-bedroom" class="type-btn-desain-kamar p-3 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-bed text-2xl mb-1 text-amber-500"></i>
              <span class="block font-medium">Kamar Utama</span>
            </button>
            <button type="button" data-type="kids-room" class="type-btn-desain-kamar p-3 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent">
              <i class="fas fa-child text-2xl mb-1 text-amber-500"></i>
              <span class="block font-medium">Kamar Anak</span>
            </button>
            <button type="button" data-type="guest-room" class="type-btn-desain-kamar p-3 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent">
              <i class="fas fa-user-friends text-2xl mb-1 text-amber-500"></i>
              <span class="block font-medium">Kamar Tamu</span>
            </button>
            <button type="button" data-type="teen-room" class="type-btn-desain-kamar p-3 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent">
              <i class="fas fa-user-graduate text-2xl mb-1 text-amber-500"></i>
              <span class="block font-medium">Kamar Remaja</span>
            </button>
            <button type="button" data-type="nursery" class="type-btn-desain-kamar p-3 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent">
              <i class="fas fa-baby text-2xl mb-1 text-amber-500"></i>
              <span class="block font-medium">Kamar Bayi</span>
            </button>
          </div>
        </div>
        
        <!-- Step 2: Style -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Gaya Desain</h2>
          
          <div class="space-y-4">
            <div>
              <label for="desain-kamar-style" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-paint-brush mr-1 text-amber-500"></i>Gaya Desain
              </label>
              <select id="desain-kamar-style" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
                <option value="modern">Modern</option>
                <option value="minimalist">Minimalis</option>
                <option value="traditional">Tradisional</option>
                <option value="industrial">Industrial</option>
                <option value="scandinavian">Skandinavia</option>
                <option value="bohemian">Bohemian</option>
                <option value="tropical">Tropis</option>
                <option value="vintage">Vintage</option>
                <option value="romantic">Romantis</option>
              </select>
            </div>
            
            <div>
              <label for="desain-kamar-custom-style" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-pen mr-1 text-amber-500"></i>Gaya Custom
              </label>
              <input type="text" id="desain-kamar-custom-style" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="Masukkan gaya custom...">
            </div>
          </div>
        </div>
        
        <!-- Step 3: Color Palette -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Palet Warna</h2>
          
          <div class="space-y-4">
            <div>
              <label for="desain-kamar-color" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-palette mr-1 text-amber-500"></i>Palet Warna
              </label>
              <select id="desain-kamar-color" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
                <option value="warm">Hangat</option>
                <option value="cool">Sejuk</option>
                <option value="neutral">Netral</option>
                <option value="pastel">Pastel</option>
                <option value="earth">Alam</option>
                <option value="monochrome">Monokrom</option>
              </select>
            </div>
            
            <div>
              <label for="desain-kamar-custom-colors" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-tint mr-1 text-amber-500"></i>Warna Custom
              </label>
              <input type="text" id="desain-kamar-custom-colors" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="Contoh: krem, coklat lembut, sage green...">
            </div>
          </div>
        </div>
        
        <!-- Step 4: Furniture -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Furnitur</h2>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                <i class="fas fa-couch mr-1 text-amber-500"></i>Furnitur yang Diinginkan
              </label>
              <div id="desain-kamar-furniture-options" class="grid grid-cols-2 gap-2">
                <button type="button" data-furniture="bed" class="furniture-btn-desain-kamar p-2 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent selected" data-selected="true">
                  <i class="fas fa-bed text-lg mb-1 text-amber-500"></i>
                  <span class="block">Tempat Tidur</span>
                </button>
                <button type="button" data-furniture="wardrobe" class="furniture-btn-desain-kamar p-2 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent" data-selected="false">
                  <i class="fas fa-tshirt text-lg mb-1 text-amber-500"></i>
                  <span class="block">Lemari</span>
                </button>
                <button type="button" data-furniture="desk" class="furniture-btn-desain-kamar p-2 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent" data-selected="false">
                  <i class="fas fa-desk text-lg mb-1 text-amber-500"></i>
                  <span class="block">Meja Kerja</span>
                </button>
                <button type="button" data-furniture="nightstand" class="furniture-btn-desain-kamar p-2 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent" data-selected="false">
                  <i class="fas fa-nightstand text-lg mb-1 text-amber-500"></i>
                  <span class="block">Nakas</span>
                </button>
                <button type="button" data-furniture="seating" class="furniture-btn-desain-kamar p-2 rounded-lg text-sm bg-gray-100 hover:bg-amber-100 transition text-center border-2 border-transparent" data-selected="false">
                  <i class="fas fa-chair text-lg mb-1 text-amber-500"></i>
                  <span class="block">Tempat Duduk</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Step 5: Target Audience -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">5. Target Penghuni</h2>
          
          <div class="space-y-4">
            <div>
              <label for="desain-kamar-audience" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-users mr-1 text-amber-500"></i>Target Penghuni
              </label>
              <select id="desain-kamar-audience" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
                <option value="couples">Pasangan Suami Istri</option>
                <option value="parents">Orang Tua dengan Anak</option>
                <option value="teens">Remaja</option>
                <option value="single-professionals">Profesional Single</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- Step 6: Tone -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">6. Nuansa</h2>
          
          <div class="space-y-4">
            <div>
              <label for="desain-kamar-tone" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-heart mr-1 text-amber-500"></i>Nuansa
              </label>
              <select id="desain-kamar-tone" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
                <option value="cozy">Nyaman & Hangat</option>
                <option value="spacious">Luas & Terbuka</option>
                <option value="bright">Cerah & Terang</option>
                <option value="minimal">Minimalis & Bersih</option>
                <option value="luxurious">Mewah & Elegan</option>
                <option value="playful">Playful & Warna-warni</option>
                <option value="romantic">Romantis & Lembut</option>
              </select>
            </div>
            
            <div>
              <label for="desain-kamar-special" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-star mr-1 text-amber-500"></i>Permintaan Khusus
              </label>
              <textarea id="desain-kamar-special" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="Detail khusus yang diinginkan..."></textarea>
            </div>
          </div>
        </div>
        
        <!-- Step 7: Generate Button -->
        <button id="desain-kamar-generate-btn" class="w-full bg-gradient-to-r from-amber-500 via-orange-500 to-amber-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Desain Kamar
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="desain-kamar-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="desain-kamar-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-bed text-6xl mb-4 text-amber-400"></i>
            <p class="text-xl">Hasil desain kamar akan muncul di sini</p>
            <p class="text-sm mt-2">Isi informasi dan klik Buat Desain Kamar</p>
          </div>
          <div id="desain-kamar-results" class="hidden space-y-6"></div>
          <div id="desain-kamar-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-amber-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat desain kamar...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>
