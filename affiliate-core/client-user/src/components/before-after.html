<div id="content-before-after" class="main-content-panel hidden">
  <div class="container mx-auto px-4 py-8">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 to-slate-500 bg-clip-text text-transparent">
        <i class="fas fa-exchange-alt mr-3"></i>Before/After
      </h1>
      <p class="text-lg text-gray-600 mt-2">Tunjukkan transformasi Anda dengan perbandingan visual</p>
    </header>
    
    <!-- Main Content -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left Panel: Controls -->
      <div class="lg:col-span-1 space-y-6">
        
        <!-- Step 1: Before Image Upload -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Foto Sebelum</h2>
          <div class="upload-area">
            <label for="before-after-before-image-input" class="file-input-label block border-3 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 transition-colors">
              <input type="file" id="before-after-before-image-input" class="hidden" accept="image/*">
              <i class="fas fa-camera text-4xl text-slate-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto sebelum transformasi</p>
            </label>
          </div>
          <div id="before-after-before-image-preview-container" class="hidden mt-4 relative">
            <img id="before-after-before-image-preview" src="#" alt="Pratinjau Foto Sebelum" class="rounded-lg w-full h-auto object-contain">
            <button id="before-after-before-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 2: After Image Upload -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Foto Sesudah</h2>
          <div class="upload-area">
            <label for="before-after-after-image-input" class="file-input-label block border-3 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 transition-colors">
              <input type="file" id="before-after-after-image-input" class="hidden" accept="image/*">
              <i class="fas fa-camera text-4xl text-slate-400 mb-3"></i>
              <p class="text-gray-600">Klik atau seret foto setelah transformasi</p>
            </label>
          </div>
          <div id="before-after-after-image-preview-container" class="hidden mt-4 relative">
            <img id="before-after-after-image-preview" src="#" alt="Pratinjau Foto Sesudah" class="rounded-lg w-full h-auto object-contain">
            <button id="before-after-after-remove-image-btn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        
        <!-- Step 3: Transformation Type Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Jenis Transformasi</h2>
          <div id="before-after-transformation-options" class="grid grid-cols-1 gap-2">
            <button type="button" data-transformation="" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-star mr-1"></i>Pilih Jenis...
            </button>
            <button type="button" data-transformation="Perawatan Kulit (Skincare)" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-spa mr-1"></i>Perawatan Kulit
            </button>
            <button type="button" data-transformation="Diet & Fitness" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-heartbeat mr-1"></i>Diet & Fitness
            </button>
            <button type="button" data-transformation="Rambut & Styling" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-cut mr-1"></i>Rambut & Styling
            </button>
            <button type="button" data-transformation="Fashion & Gaya" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-tshirt mr-1"></i>Fashion & Gaya
            </button>
            <button type="button" data-transformation="Makeup Transformation" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-magic mr-1"></i>Makeup Transformation
            </button>
            <button type="button" data-transformation="Home Renovation" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-home mr-1"></i>Home Renovation
            </button>
            <button type="button" data-transformation="Lainnya" class="transformation-btn-before-after p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-ellipsis-h mr-1"></i>Lainnya
            </button>
          </div>
        </div>
        
        <!-- Step 4: Time Period Selection -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">4. Periode Waktu</h2>
          <div id="before-after-time-options" class="grid grid-cols-2 gap-2">
            <button type="button" data-time="" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent selected" data-selected="true">
              <i class="fas fa-clock mr-1"></i>Pilih...
            </button>
            <button type="button" data-time="1 Minggu" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar-week mr-1"></i>1 Minggu
            </button>
            <button type="button" data-time="1 Bulan" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar-alt mr-1"></i>1 Bulan
            </button>
            <button type="button" data-time="3 Bulan" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar-alt mr-1"></i>3 Bulan
            </button>
            <button type="button" data-time="6 Bulan" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar-alt mr-1"></i>6 Bulan
            </button>
            <button type="button" data-time="1 Tahun" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar mr-1"></i>1 Tahun
            </button>
            <button type="button" data-time=">1 Tahun" class="time-btn-before-after p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-calendar mr-1"></i>>1 Tahun
            </button>
          </div>
        </div>
        
        <!-- Step 5: Key Changes Description -->
        <div class="card p-6 rounded-2xl shadow-lg bg-white">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">5. Deskripsi Perubahan Utama</h2>
          <textarea 
            id="before-after-description-input" 
            class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all resize-none" 
            rows="4" 
            placeholder="Jelaskan perubahan utama yang terjadi (contoh: penurunan berat badan 10kg, kulit lebih bersih, gaya rambut baru, dll.)"
          ></textarea>
        </div>
        
        <!-- Step 6: Generate Button -->
        <button id="before-after-generate-btn" class="w-full bg-gradient-to-r from-blue-600 to-slate-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Before/After
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="before-after-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="before-after-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-exchange-alt text-6xl mb-4 text-slate-400"></i>
            <p class="text-xl">Hasil akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto dan klik Buat Before/After</p>
          </div>
          <div id="before-after-results" class="hidden grid grid-cols-1 gap-6"></div>
          <div id="before-after-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat perbandingan before/after...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Before/After Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    beforeImage: null,
    afterImage: null,
    selectedTransformation: '',
    selectedTime: '',
    description: '',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    beforeImageInput: document.getElementById('before-after-before-image-input'),
    beforeImagePreview: document.getElementById('before-after-before-image-preview'),
    beforeImagePreviewContainer: document.getElementById('before-after-before-image-preview-container'),
    beforeRemoveImageBtn: document.getElementById('before-after-before-remove-image-btn'),
    afterImageInput: document.getElementById('before-after-after-image-input'),
    afterImagePreview: document.getElementById('before-after-after-image-preview'),
    afterImagePreviewContainer: document.getElementById('before-after-after-image-preview-container'),
    afterRemoveImageBtn: document.getElementById('before-after-after-remove-image-btn'),
    transformationOptions: document.getElementById('before-after-transformation-options'),
    timeOptions: document.getElementById('before-after-time-options'),
    descriptionInput: document.getElementById('before-after-description-input'),
    generateBtn: document.getElementById('before-after-generate-btn'),
    results: document.getElementById('before-after-results'),
    emptyState: document.getElementById('before-after-empty-state'),
    loading: document.getElementById('before-after-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Before image upload
    elements.beforeImageInput?.addEventListener('change', (e) => handleImageUpload(e, 'before'));
    
    // After image upload
    elements.afterImageInput?.addEventListener('change', (e) => handleImageUpload(e, 'after'));
    
    // Remove before image
    elements.beforeRemoveImageBtn?.addEventListener('click', () => removeImage('before'));
    
    // Remove after image
    elements.afterRemoveImageBtn?.addEventListener('click', () => removeImage('after'));
    
    // Transformation selection
    elements.transformationOptions?.addEventListener('click', handleTransformationSelection);
    
    // Time period selection
    elements.timeOptions?.addEventListener('click', handleTimeSelection);
    
    // Description input
    elements.descriptionInput?.addEventListener('input', handleDescriptionChange);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateBeforeAfter);
  }
  
  // Handle image upload
  function handleImageUpload(event, type) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      const imageData = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      if (type === 'before') {
        state.beforeImage = imageData;
        elements.beforeImagePreview.src = e.target.result;
        elements.beforeImagePreviewContainer.classList.remove('hidden');
      } else {
        state.afterImage = imageData;
        elements.afterImagePreview.src = e.target.result;
        elements.afterImagePreviewContainer.classList.remove('hidden');
      }
      
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage(type) {
    if (type === 'before') {
      state.beforeImage = null;
      elements.beforeImageInput.value = '';
      elements.beforeImagePreviewContainer.classList.add('hidden');
    } else {
      state.afterImage = null;
      elements.afterImageInput.value = '';
      elements.afterImagePreviewContainer.classList.add('hidden');
    }
    updateGenerateButton();
  }
  
  // Handle transformation selection
  function handleTransformationSelection(event) {
    const btn = event.target.closest('.transformation-btn-before-after');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.transformation-btn-before-after').forEach(b => {
      b.classList.remove('border-blue-500', 'bg-blue-50');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-blue-500', 'bg-blue-50');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedTransformation = btn.dataset.transformation || '';
    updateGenerateButton();
  }
  
  // Handle time period selection
  function handleTimeSelection(event) {
    const btn = event.target.closest('.time-btn-before-after');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.time-btn-before-after').forEach(b => {
      b.classList.remove('border-blue-500', 'bg-blue-50');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-blue-500', 'bg-blue-50');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedTime = btn.dataset.time || '';
    updateGenerateButton();
  }
  
  // Handle description change
  function handleDescriptionChange(event) {
    state.description = event.target.value;
    updateGenerateButton();
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImages = state.beforeImage !== null && state.afterImage !== null;
    const hasTransformation = state.selectedTransformation !== '';
    const hasTime = state.selectedTime !== '';
    const hasDescription = state.description.trim().length > 0;
    
    elements.generateBtn.disabled = !hasImages || !hasTransformation || !hasTime || !hasDescription || state.isGenerating;
  }
  
  // Generate before/after comparison
  async function generateBeforeAfter() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API with both images
      const response = await callGeminiImageComparison(prompt, state.beforeImage, state.afterImage);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const transformation = state.selectedTransformation || 'General transformation';
    const time = state.selectedTime || 'Unknown time period';
    const description = state.description || 'No description provided';
    
    return `Create a professional before/after comparison image showing transformation with the following details:
    
Transformation Type: ${transformation}
Time Period: ${time}
Description: ${description}

Create a side-by-side comparison that:
1. Shows the "Before" image on the left and "After" image on the right
2. Has clear visual comparison with proper alignment
3. Includes "SEBELUM" (Before) and "SESUDAH" (After) labels in Indonesian
4. Shows the transformation period (${time})
5. Highlights the key changes mentioned: ${description}
6. Has a clean, professional appearance
7. Uses appropriate styling for ${transformation} transformation
8. Is suitable for social media sharing and personal documentation

Return the enhanced before/after comparison image.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (!imageData) {
        throw new Error('No image data in response');
      }
      
      return {
        type: 'image',
        data: imageData,
        mimeType: response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || 'image/png'
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      elements.results.innerHTML = `
        <div class="col-span-1">
          <div class="bg-gradient-to-br from-blue-50 to-slate-50 rounded-xl p-6 border border-slate-200">
            <h3 class="font-semibold text-lg text-slate-800 mb-4">Before/After Hasil AI</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="Before/After Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="before-after-download-btn" data-image-url="${imageUrl}" data-filename="before-after-result.png" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
                <button id="before-after-copy-btn" data-image-url="${imageUrl}" class="bg-slate-600 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors shadow-lg">
                  <i class="fas fa-copy mr-2"></i>Copy
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('before-after-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
      
      // Add copy functionality
      const copyBtn = document.getElementById('before-after-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const imageUrl = copyBtn.dataset.imageUrl;
          try {
            const response = await fetch(imageUrl);
            const blob = await response.blob();
            await navigator.clipboard.write([
              new ClipboardItem({
                [blob.type]: blob
              })
            ]);
            showToast('Gambar berhasil disalin ke clipboard!');
          } catch (error) {
            showToast('Gagal menyalin gambar. Coba download instead.');
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="col-span-1 bg-gradient-to-br from-blue-50 to-slate-50 rounded-xl p-6 border border-slate-200">
          <h3 class="font-semibold text-lg text-slate-800 mb-4">Hasil</h3>
          <div class="prose prose-slate max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
