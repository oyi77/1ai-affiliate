            <button type="button" data-background="Gradient from light gray to white, soft professional lighting, clean corporate look" class="background-btn-professional-headshot p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">

            <button type="button" data-background="Modern office environment background with blurred conference room, professional corporate setting" class="background-btn-professional-headshot p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-building mr-1"></i>Office

            <button type="button" data-background="Corporate library background with bookshelves, intellectual and professional atmosphere" class="background-btn-professional-headshot p-2 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">

        <!-- Step 3: Clothing/Attire Selection -->

          <h2 class="text-xl font-semibold mb-4 text-gray-800">3. Pakaian</h2>
          <div id="professional-headshot-clothing-options" class="grid grid-cols-1 gap-2">

            <button type="button" data-clothing="Business formal attire, navy blazer, white dress shirt, professional corporate look" class="clothing-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-briefcase mr-1"></i>Business Formal

            <button type="button" data-clothing="Business casual attire, button-down shirt, smart and approachable professional look" class="clothing-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-user-tie mr-1"></i>Business Casual

            <button type="button" data-clothing="Smart casual attire, collared shirt, relaxed yet professional appearance" class="clothing-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">

            <button type="button" data-expression="Confident and authoritative expression, direct eye contact, strong leadership presence" class="expression-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">

            <button type="button" data-expression="Friendly and approachable expression, warm smile, welcoming professional demeanor" class="expression-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-smile-beam mr-1"></i>Friendly
            </button>
            <button type="button" data-expression="Professional and polished expression, subtle smile, executive presence" class="expression-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">
              <i class="fas fa-user-check mr-1"></i>Professional
            </button>
            <button type="button" data-expression="Executive presence, commanding and sophisticated, high-level leadership appearance" class="expression-btn-professional-headshot p-3 rounded-lg text-sm bg-gray-100 hover:bg-slate-100 transition text-center border-2 border-transparent">

        </div>
        
        <!-- Step 5: Generate Button -->
        <button id="professional-headshot-generate-btn" class="w-full bg-gradient-to-r from-slate-600 to-blue-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-magic mr-2"></i>Buat Professional Headshot
        </button>
        
      </div>
      
      <!-- Right Panel: Results -->
      <div class="lg:col-span-2">
        <div id="professional-headshot-results-container" class="card p-6 rounded-2xl shadow-lg bg-white min-h-[500px]">
          <div id="professional-headshot-empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-12">
            <i class="fas fa-user-tie text-6xl mb-4 text-slate-400"></i>
            <p class="text-xl">Hasil akan muncul di sini</p>
            <p class="text-sm mt-2">Unggah foto dan klik Buat Professional Headshot</p>
          </div>
          <div id="professional-headshot-results" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
          <div id="professional-headshot-loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-500 h-12 w-12 mb-4"></div>
            <p class="text-gray-600">Sedang membuat professional headshot...</p>
          </div>
        </div>
      </div>
      
    </main>
    
  </div>
</div>

<script>
// Professional Headshot Component Logic
(function() {
  'use strict';
  
  // State management
  const state = {
    headshotImage: null,
    selectedBackground: '',
    selectedClothing: '',
    selectedExpression: '',
    isGenerating: false
  };
  
  // DOM Elements
  const elements = {
    imageInput: document.getElementById('professional-headshot-image-input'),
    imagePreview: document.getElementById('professional-headshot-image-preview'),
    imagePreviewContainer: document.getElementById('professional-headshot-image-preview-container'),
    removeImageBtn: document.getElementById('professional-headshot-remove-image-btn'),
    backgroundOptions: document.getElementById('professional-headshot-background-options'),
    clothingOptions: document.getElementById('professional-headshot-clothing-options'),
    expressionOptions: document.getElementById('professional-headshot-expression-options'),
    generateBtn: document.getElementById('professional-headshot-generate-btn'),
    results: document.getElementById('professional-headshot-results'),
    emptyState: document.getElementById('professional-headshot-empty-state'),
    loading: document.getElementById('professional-headshot-loading')
  };
  
  // Initialize component
  function init() {
    setupEventListeners();
  }
  
  // Setup event listeners
  function setupEventListeners() {
    // Image upload
    elements.imageInput?.addEventListener('change', handleImageUpload);
    
    // Remove image
    elements.removeImageBtn?.addEventListener('click', removeImage);
    
    // Background selection
    elements.backgroundOptions?.addEventListener('click', handleBackgroundSelection);
    
    // Clothing selection
    elements.clothingOptions?.addEventListener('click', handleClothingSelection);
    
    // Expression selection
    elements.expressionOptions?.addEventListener('click', handleExpressionSelection);
    
    // Generate button
    elements.generateBtn?.addEventListener('click', generateProfessionalHeadshot);
  }
  
  // Handle image upload
  function handleImageUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Tipe file tidak valid. Silakan pilih gambar.');
      return;
    }
    
    // Read file
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      state.headshotImage = {
        base64,
        mimeType: file.type,
        filename: file.name
      };
      
      // Show preview
      elements.imagePreview.src = e.target.result;
      elements.imagePreviewContainer.classList.remove('hidden');
      
      // Enable generate button
      updateGenerateButton();
    };
    reader.readAsDataURL(file);
  }
  
  // Remove image
  function removeImage() {
    state.headshotImage = null;
    elements.imageInput.value = '';
    elements.imagePreviewContainer.classList.add('hidden');
    updateGenerateButton();
  }
  
  // Handle background selection
  function handleBackgroundSelection(event) {
    const btn = event.target.closest('.background-btn-professional-headshot');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.background-btn-professional-headshot').forEach(b => {
      b.classList.remove('border-slate-500', 'bg-slate-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-slate-500', 'bg-slate-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedBackground = btn.dataset.background || '';
    updateGenerateButton();
  }
  
  // Handle clothing selection
  function handleClothingSelection(event) {
    const btn = event.target.closest('.clothing-btn-professional-headshot');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.clothing-btn-professional-headshot').forEach(b => {
      b.classList.remove('border-slate-500', 'bg-slate-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-slate-500', 'bg-slate-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedClothing = btn.dataset.clothing || '';
    updateGenerateButton();
  }
  
  // Handle expression selection
  function handleExpressionSelection(event) {
    const btn = event.target.closest('.expression-btn-professional-headshot');
    if (!btn) return;
    
    // Remove selected class from all buttons
    document.querySelectorAll('.expression-btn-professional-headshot').forEach(b => {
      b.classList.remove('border-slate-500', 'bg-slate-100');
      b.classList.add('border-transparent');
      b.setAttribute('data-selected', 'false');
    });
    
    // Add selected class to clicked button
    btn.classList.remove('border-transparent');
    btn.classList.add('border-slate-500', 'bg-slate-100');
    btn.setAttribute('data-selected', 'true');
    
    state.selectedExpression = btn.dataset.expression || '';
    updateGenerateButton();
  }
  
  // Update generate button state
  function updateGenerateButton() {
    if (!elements.generateBtn) return;
    
    const hasImage = state.headshotImage !== null;
    elements.generateBtn.disabled = !hasImage || state.isGenerating;
  }
  
  // Generate professional headshot
  async function generateProfessionalHeadshot() {
    if (!window.checkApiKey?.()) return;
    
    state.isGenerating = true;
    updateGenerateButton();
    
    // Show loading
    elements.emptyState.classList.add('hidden');
    elements.results.classList.add('hidden');
    elements.loading.classList.remove('hidden');
    
    try {
      // Build prompt
      const prompt = buildPrompt();
      
      // Call API
      const response = await callGeminiImage(prompt, state.headshotImage.base64, state.headshotImage.mimeType);
      
      // Process response
      const result = processResponse(response);
      
      // Display results
      displayResults(result);
      
    } catch (error) {
      showToast(`Error: ${error.message}`);
      elements.emptyState.classList.remove('hidden');
    } finally {
      state.isGenerating = false;
      elements.loading.classList.add('hidden');
      updateGenerateButton();
    }
  }
  
  // Build prompt from state
  function buildPrompt() {
    const background = state.selectedBackground || 'Professional headshot photography';
    const clothing = state.selectedClothing || 'Keep original attire';
    const expression = state.selectedExpression || 'Natural expression';
    
    return `Transform this portrait into a professional headshot with the following specifications:
    
Background: ${background}
Attire: ${clothing}
Expression/Style: ${expression}

Create a professional headshot that:
1. Has proper professional lighting and composition
2. Shows the subject from chest up (professional headshot style)
3. Has sharp focus on the face and eyes
4. Has appropriate depth of field
5. Is suitable for LinkedIn, corporate websites, business cards
6. Has a clean, professional appearance
7. Shows confidence and approachability

Return the enhanced professional headshot image.`;
  }
  
  // Process API response
  function processResponse(response) {
    try {
      const imageData = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData)?.inlineData?.data;
      
      if (!imageData) {
        throw new Error('No image data in response');
      }
      
      return {
        type: 'image',
        data: imageData,
        mimeType: response.candidates[0].content.parts.find(part => part.inlineData)?.inlineData?.mimeType || 'image/png'
      };
    } catch (error) {
      throw new Error('Gagal memproses response dari AI');
    }
  }
  
  // Display results
  function displayResults(result) {
    elements.loading.classList.add('hidden');
    elements.results.classList.remove('hidden');
    
    if (result.type === 'image') {
      const imageUrl = `data:${result.mimeType};base64,${result.data}`;
      elements.results.innerHTML = `
        <div class="col-span-2">
          <div class="bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-6 border border-slate-200">
            <h3 class="font-semibold text-lg text-slate-800 mb-4">Professional Headshot Hasil AI</h3>
            <div class="relative">
              <img src="${imageUrl}" alt="Professional Headshot Result" class="rounded-lg w-full h-auto object-contain">
              <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="professional-headshot-download-btn" data-image-url="${imageUrl}" data-filename="professional-headshot-result.png" class="bg-slate-600 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors shadow-lg">
                  <i class="fas fa-download mr-2"></i>Download
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Add download functionality
      const downloadBtn = document.getElementById('professional-headshot-download-btn');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', async () => {
          const imageUrl = downloadBtn.dataset.imageUrl;
          const filename = downloadBtn.dataset.filename;
          if (window.downloadImage) {
            await window.downloadImage(imageUrl, filename);
          }
        });
      }
    } else {
      elements.results.innerHTML = `
        <div class="col-span-2 bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-6 border border-slate-200">
          <h3 class="font-semibold text-lg text-slate-800 mb-4">Hasil</h3>
          <div class="prose prose-slate max-w-none">
            ${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
