# PHP site config for 1ai-Affiliate
# Included by nginx.conf via include /etc/nginx/sites-enabled/*.conf

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Catch-all, Cloudflare handles actual domain routing

    root /var/www/html;
    index index.php;

    # Security headers (additional to Cloudflare)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Deep link landing pages: l.berkahkarya.org/{slug}
    # Must come before the catch-all to intercept slug URLs
    location ~ ^/([a-zA-Z0-9_-]{1,32})$ {
        rewrite ^/([a-zA-Z0-9_-]{1,32})$ /tracking_support/static/deeplink.php?slug=$1 last;
    }

    # Main PHP routing - Slim/Slim routes via index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Security - deny access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|svn|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # Deny access to backup files
    location ~* \.(bak|backup|old|orig|save)$ {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}