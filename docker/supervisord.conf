; Supervisord config for PHP container
; Runs nginx + php-fpm together

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=10MB
logfile_backups=5
loglevel=info
pidfile=/run/supervisord.pid

[program:php-fpm]
command=php-fpm --nodaemonize --fpm-config /usr/local/etc/php-fpm.conf
user=root
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/php-fpm/stdout.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/php-fpm/stderr.log
stderr_logfile_maxbytes=10MB

[program:nginx]
command=nginx -g "daemon off;"
user=root
autostart=true
autorestart=true
startsecs=3
startretries=3
stdout_logfile=/var/log/nginx/stdout.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/nginx/stderr.log
stderr_logfile_maxbytes=10MB

; Create log directories on startup
[program:setup-logs]
command=bash -c "mkdir -p /var/log/nginx /var/log/php-fpm /var/log/supervisor && chown -R www-data:www-data /var/log/nginx /var/log/php-fpm /var/log/supervisor"
user=root
autostart=true
autorestart=false
startsecs=0