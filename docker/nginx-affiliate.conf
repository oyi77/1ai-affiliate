# 1ai-Affiliate nginx config
# Routes: PHP tracking → PHP-FPM:9002, SPA/API → Node.js:3001
# Managed by cf-router — edit via /home/openclaw/projects/1ai-cf-router/

server {
    listen 6969;
    server_name affiliate.berkahkarya.org;

    root /home/openclaw/.paseo/worktrees/3q6b2aw8/smooth-cobra;
    index index.php index.html;

    # ── PHP tracking endpoints ────────────────────────────────
    # Core tracking: click.php, postback.php, redirect/, etc.
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9002;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 30;
    }

    # ── Tracking support UI ───────────────────────────────────
    location /tracking_support/ {
        try_files $uri $uri/ /tracking_support/index.php?$query_string;
    }

    # ── Node.js SPA + API ─────────────────────────────────────
    location ~ ^/(api|go|admin|client|health|metrics|api-docs) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Static files (PHP root) ───────────────────────────────
    location / {
        try_files $uri $uri/ @node;
    }

    # ── Fallback to Node.js SPA ───────────────────────────────
    location @node {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check for cf-router ────────────────────────────
    location /cf-health {
        return 200 '{"status":"ok","service":"affiliate","domain":"affiliate.berkahkarya.org"}';
        add_header Content-Type application/json;
    }

    # ── Error pages ───────────────────────────────────────────
    error_page 404 /_cf-error/404.html;
    error_page 500 /_cf-error/500.html;
    error_page 502 /_cf-error/502.html;
    error_page 503 /_cf-error/503.html;
    location ^~ /_cf-error/ {
        internal;
        alias /home/openclaw/projects/1ai-cf-router/error-pages/;
    }
}
