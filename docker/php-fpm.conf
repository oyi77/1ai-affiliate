; PHP-FPM pool config for 1ai-Affiliate
; Included as /usr/local/etc/php-fpm.d/www.conf

[www]
user = www-data
group = www-data
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process manager
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 15
pm.max_requests = 500

; Status page (for monitoring)
pm.status_path = /php-fpm-status
ping.path = /ping
ping.response = pong

; Slow log
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 30s

; Log
;php_admin_value[error_log] = /var/log/php-fpm/error.log

; Security
security.limit_extensions = .php

; PHP settings
php_admin_value[error_log] = /var/log/php-fpm/error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_time] = 300
php_admin_value[post_max_size] = 100M
php_admin_value[upload_max_filesize] = 100M

; OpCache
php_flag[opcache.enable] = on
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.interned_strings_buffer] = 8
php_admin_value[opcache.max_accelerated_files] = 4000
php_admin_value[opcache.revalidate_freq] = 60
php_admin_value[opcache.fast_shutdown] = 1
php_admin_value[opcache.enable_cli] = 1

; Session
php_value[session.save_handler] = redis
php_value[session.save_path] = "tcp://redis:6379"
php_value[session.gc_maxlifetime] = 1440
php_value[session.gc_probability] = 1
php_value[session.gc_divisor] = 1000

; Security
php_admin_flag[expose_php] = off
php_admin_value[open_basedir] = /var/www/html:/tmp:/usr/share/php